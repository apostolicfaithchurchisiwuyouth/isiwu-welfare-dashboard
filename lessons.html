<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Weekly Lessons | AFC Isiwu Youth</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Host+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#0d47a1;
--primary-light:#1976d2;
--bg:#f5f8fc;
--card:#ffffff;
--text:#1f2937;
--muted:#64748b;
--border:rgba(15,23,42,.08);
}

body{
font-family:'Host Grotesk',sans-serif;
background:linear-gradient(180deg,#f7faff 0%,#eef4fb 100%);
color:var(--text);
min-height:100vh;
position:relative;
overflow-x:hidden;
}

/* Floating background */
body::before,
body::after{
content:"";
position:fixed;
border-radius:50%;
pointer-events:none;
z-index:-1;
filter:blur(80px);
}

body::before{
width:280px;
height:280px;
background:rgba(25,118,210,.18);
top:-100px;
left:-80px;
}

body::after{
width:320px;
height:320px;
background:rgba(13,71,161,.12);
bottom:-120px;
right:-80px;
}

h1,h2,h3{
font-family:'Bricolage Grotesque',sans-serif;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:100;
padding:18px 7%;
display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,.75);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.5);
box-shadow:0 4px 20px rgba(0,0,0,.04);
}

header h2{
font-size:1.15rem;
font-weight:700;
}

.back{
text-decoration:none;
color:var(--primary);
font-size:.85rem;
font-weight:600;

padding:10px 16px;
border-radius:999px;

background:white;
border:1px solid var(--border);

transition:.25s ease;
}

.back:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* CONTAINER */
.container{
max-width:1050px;
margin:35px auto;
padding:0 18px;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
padding:8px;
margin-bottom:24px;

background:rgba(255,255,255,.8);
backdrop-filter:blur(12px);

border-radius:18px;
border:1px solid var(--border);

box-shadow:
0 1px 3px rgba(0,0,0,.04),
0 10px 30px rgba(0,0,0,.04);

width:fit-content;
}

.tab{
padding:12px 20px;
border:none;
border-radius:999px;
cursor:pointer;

background:transparent;
color:#475569;

font-weight:600;
font-size:.88rem;

transition:.25s ease;

-webkit-tap-highlight-color:transparent;
outline:none;
}

.tab:hover{
background:#eef5ff;
}

.tab.active{
background:linear-gradient(
135deg,
var(--primary),
var(--primary-light)
);

color:white;

box-shadow:
0 8px 20px rgba(25,118,210,.25);
}

/* MAIN CARD */
.card{
background:rgba(255,255,255,.92);

backdrop-filter:blur(20px);

border-radius:28px;
padding:28px;

border:1px solid rgba(255,255,255,.6);

box-shadow:
0 2px 8px rgba(0,0,0,.04),
0 20px 40px rgba(0,0,0,.06);

animation:fadeUp .5s ease;
}

/* TOP HERO */
.topic{
font-size:1.6rem;
font-weight:800;
line-height:1.3;

margin-bottom:12px;
color:#0f172a;
}

.meta{
display:inline-flex;
align-items:center;
gap:8px;

padding:8px 14px;
border-radius:999px;

background:#eaf3ff;
color:var(--primary);

font-size:.82rem;
font-weight:700;

margin-bottom:24px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:20px;
}

/* SECTION CARDS */
.grid > div{
background:#f9fbff;

border:1px solid #e8eef7;

padding:18px;
border-radius:18px;

transition:.25s ease;
}

.grid > div:hover{
transform:translateY(-2px);
box-shadow:0 12px 24px rgba(0,0,0,.05);
}

/* SECTION TITLES */
.section-title{
font-size:.92rem;
font-weight:700;
letter-spacing:.2px;

color:var(--primary);

margin-bottom:10px;

display:flex;
align-items:center;
gap:8px;
}

/* CONTENT */
.text{
font-size:.95rem;
line-height:1.9;
color:#334155;
white-space:pre-wrap;
}

/* Summary & Discussion */
.card > .section-title{
margin-top:12px;
font-size:1rem;
}

.card > .text{
padding:18px;
background:#f9fbff;
border:1px solid #e8eef7;
border-radius:18px;
margin-bottom:18px;
}

/* Mobile */
@media(max-width:768px){

.container{
margin:22px auto;
}

.tabs{
width:100%;
justify-content:space-between;
overflow-x:auto;
}

.tab{
flex:1;
white-space:nowrap;
}

.card{
padding:20px;
border-radius:22px;
}

.topic{
font-size:1.3rem;
}

.grid{
grid-template-columns:1fr;
}
}

/* Animation */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>
<h2>📖 Weekly Lessons</h2>
<a class="back" href="index.html">← Back</a>
</header>

<div class="container">

<div class="tabs">
<button class="tab active" onclick="switchClass('Senior')">Senior</button>
<button class="tab" onclick="switchClass('Junior')">Junior</button>
<button class="tab" onclick="switchClass('Elementary')">Elementary</button>
</div>

<div class="card">

<div class="topic" id="topic">Loading...</div>
<div class="meta" id="meta"></div>

<div class="grid">

<div>
<div class="section-title">Bible Text</div>
<div class="text" id="bibleText"></div>
</div>

<div>
<div class="section-title">Memory Verse</div>
<div class="text" id="memoryVerse"></div>
</div>

</div>

<br>

<div class="section-title">Summary</div>
<div class="text" id="summary"></div>

<br>

<div class="section-title">Discussion</div>
<div class="text" id="discussion"></div>

</div>

</div>

<script>

// 🔴 YOUR CSV (UNCHANGED)
const weeklyLessonCSV =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=201183837&single=true&output=csv";

let lessons = [];

async function loadLessons(){

const res = await fetch(weeklyLessonCSV);
const csv = await res.text();

const result = Papa.parse(csv, {
header:true,
skipEmptyLines:true
});

lessons = result.data;

switchClass('Senior');
}

function switchClass(cls){

const lesson = lessons.find(l => l.Class?.trim() === cls);

if(!lesson) return;

document.getElementById("topic").innerText = lesson.Topic || "";
document.getElementById("meta").innerText = cls;

document.getElementById("bibleText").innerText = lesson.BibleText || "";
document.getElementById("memoryVerse").innerText = lesson.MemoryVerse || "";

document.getElementById("summary").innerHTML = lesson.Summary || "";
document.getElementById("discussion").innerText = lesson.Discussion || "";

// tabs UI
document.querySelectorAll(".tab").forEach(t => {
t.classList.remove("active");
if(t.innerText === cls) t.classList.add("active");
});
}

loadLessons();

</script>

</body>
</html>
