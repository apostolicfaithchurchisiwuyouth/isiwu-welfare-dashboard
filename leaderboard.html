
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"DM Sans",sans-serif;background:#fafafa}
header{position:sticky;top:0;width:88%;max-width:820px;margin:auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#4A0754,#0A0016);border-radius:0 0 18px 18px;color:#fff}
.container{width:88%;max-width:820px;margin:24px auto}
.card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 12px 35px rgba(0,0,0,.08);margin-bottom:18px;border:1px solid #eee}
.card-title{font:700 .9rem "Bricolage Grotesque";color:#4A0754;margin-bottom:12px}
.head,.row{display:grid;grid-template-columns:2fr .9fr .9fr;gap:8px;align-items:center}
.head{padding:10px;border-radius:10px;background:#f7f7fb;font-size:.9rem;font-weight:700}
.row{margin-top:8px;padding:12px;border:1px solid #f0eef6;border-radius:10px;background:#fff}
.name{font-size:.75rem;font-weight:700}.id{font-size:.65rem;color:#666}.weeks{text-align:center;font-size:.68rem}.points{text-align:right;font-size:.75rem;font-weight:700;color:#4A0754}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#f3e8ff}
.loading{font-size:.7rem;color:#777;padding:10px}
.manual{display:grid;grid-template-columns:1fr;gap:10px}
.manual .item{border:1px solid #eee;border-radius:10px;padding:14px;background:linear-gradient(180deg,#fff,#faf9ff)}
</style></head><body>
<header><div>🏆 Weekly Challenge Progress</div><a href="index.html" style="color:#fff;text-decoration:none">← Back</a></header>
<div class="container">
<div class="card">
<div class="card-title">Participant Progress</div>
<div class="head"><div>Member</div><div style="text-align:center">Weeks</div><div style="text-align:right">Points</div></div>
<div id="leaderboard" class="loading">Loading participant progress...</div>
</div>
<div class="card">
<div class="card-title">Season 1 Recognition</div>
<div class="manual">
<div class="item"><strong>Participant 1</strong><br><small>Add manually</small></div>
<div class="item"><strong>Participant 2</strong><br><small>Add manually</small></div>
<div class="item"><strong>Participant 3</strong><br><small>Add manually</small></div>
</div>
</div></div>
<script>
const API="https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";
async function load(){
const b=document.getElementById("leaderboard");
try{
const r=await fetch(API+"?action=getLeaderboard",{cache:"no-store"});
const d=await r.json();
const total=d.totalWeeks||d.totalweeks||d.seasonWeeks||0;
b.className="";
b.innerHTML=(d.leaderboard||[]).map(m=>`<div class=row><div><div class=name>${m.name}</div><div class=id>${m.memberId}</div></div><div class=weeks><span class=badge>${m.weeks}/${total}</span></div><div class=points>${Number(m.points).toLocaleString()} pts</div></div>`).join("");
}catch(e){b.textContent="Unable to load leaderboard.";}}
load();
</script></body></html>
