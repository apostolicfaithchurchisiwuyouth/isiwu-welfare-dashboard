<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFC Isiwu Youth Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#eef3f9;
color:#222;
overflow-x:hidden;
background-image:
radial-gradient(circle at top left, rgba(33,150,243,0.12), transparent 28%),
radial-gradient(circle at bottom right, rgba(156,39,176,0.10), transparent 25%),
url('https://www.transparenttextures.com/patterns/cubes.png');
}

h1,h2,h3,h4,.logo{
font-family:'Outfit',sans-serif;
}

header{
position:relative;
overflow:hidden;
background:
linear-gradient(135deg, rgba(13,71,161,0.95), rgba(25,118,210,0.92)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
padding-bottom:60px;
color:white;
}

header::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.06);
border-radius:50%;
top:-180px;
right:-120px;
backdrop-filter:blur(5px);
animation:float 8s ease-in-out infinite;
}

header::after{
content:'';
position:absolute;
width:320px;
height:320px;
background:rgba(255,255,255,0.05);
border-radius:50%;
bottom:-140px;
left:-90px;
animation:float 10s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(15px);}
100%{transform:translateY(0px);}
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 7%;
position:relative;
z-index:1000;
}

.logo{
font-size:1rem;
font-weight:700;
}

.menu{
display:flex;
gap:22px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:0.86rem;
font-weight:500;
}

.hamburger{
display:none;
font-size:1.4rem;
cursor:pointer;
color:white;
}

.hero{
padding:45px 7% 20px;
text-align:center;
position:relative;
z-index:2;
}

.hero h1{
font-size:2.5rem;
margin-bottom:10px;
}

.hero p{
max-width:680px;
margin:auto;
font-size:0.92rem;
line-height:1.7;
opacity:0.95;
}

.hero-buttons{
margin-top:25px;
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
}

.hero-buttons a{
padding:13px 24px;
border-radius:10px;
text-decoration:none;
font-size:0.84rem;
font-weight:600;
transition:0.3s;
}

.hero-buttons a:hover{
transform:translateY(-3px);
}

.btn-primary{
background:white;
color:#1565c0;
}

.btn-secondary{
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.25);
color:white;
backdrop-filter:blur(8px);
}

.container{
max-width:1250px;
margin:auto;
padding:30px 18px;
}

.section{
margin-top:45px;
padding:20px 16px;
width:100%;
border-radius:24px;
background:transparent;
}

.section-title{
display:flex;
align-items:center;
gap:10px;
margin-bottom:18px;
color:#0d47a1;
}

.section-title h2{
font-size:1rem;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card,
.activities,
.report-box,
.reports-feed,
.leaderboard,
canvas{
background:rgba(255,255,255,0.55);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card{
padding:22px;
border-radius:18px;
position:relative;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card::before{
content:'';
position:absolute;
width:130px;
height:130px;
border-radius:50%;
background:rgba(21,101,192,0.06);
top:-50px;
right:-50px;
}

.card i{
font-size:1.5rem;
margin-bottom:10px;
}

.card h2{
font-size:0.8rem;
color:#666;
margin-bottom:7px;
}

.amount{
font-size:1.55rem;
font-weight:700;
}

.green{border-left:5px solid #2e7d32;}
.red{border-left:5px solid #c62828;}
.blue{border-left:5px solid #1565c0;}

.activities,
.report-box,
.leaderboard,
.reports-feed{
padding:20px;
border-radius:18px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:13px;
font-size:0.8rem;
border-bottom:1px solid #eee;
}

th{
background:#1565c0;
color:white;
}

canvas{
padding:20px 16px;
width:100%;
border-radius:18px;
}

.report-box h2{
font-size:0.95rem;
margin-bottom:6px;
}

.report-box p{
font-size:0.78rem;
line-height:1.6;
color:#555;
}

.report-buttons{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:18px;
}

.report-btn{
padding:12px 18px;
border-radius:10px;
text-decoration:none;
color:white;
font-size:0.76rem;
font-weight:600;
background:linear-gradient(135deg,#1565c0,#42a5f5);
}

.green-btn{
background:linear-gradient(135deg,#2e7d32,#43a047);
}

.reports-feed{
margin-top:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.feed-item{
padding:14px;
background:rgba(255,255,255,0.45);
border-radius:14px;
border-left:4px solid #1565c0;
}

.feed-item h4{
font-size:0.82rem;
margin-bottom:5px;
}

.feed-item p{
font-size:0.74rem;
line-height:1.5;
color:#555;
}

footer{
margin-top:45px;
padding:25px;
text-align:center;
font-size:0.8rem;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="section" id="reports">

<div class="section-title">
<i class="fa-solid fa-file-lines"></i>
<h2>Secretariat Reports</h2>
</div>

<div class="reports-feed" id="reportsFeed"></div>

</div>

</div>

<footer>
AFC Isiwu Youth Welfare Department Portal © 2026
</footer>

<script>

const secretariatCSV =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTE5Ds6_y0OYFL9_pYfRekpMx1Jq-kijbtdXsL-LCyg5KsC8LVootmeHOew2xiqV2sAXEVUKm_3vz17/pub?gid=1085033955&single=true&output=csv";

/*
BETTER CSV PARSER
*/

function parseCSV(text){

const rows = [];
let row = [];
let current = '';
let insideQuotes = false;

for(let i = 0; i < text.length; i++){

const char = text[i];
const nextChar = text[i + 1];

if(char === '"'){

if(insideQuotes && nextChar === '"'){
current += '"';
i++;
}else{
insideQuotes = !insideQuotes;
}

}else if(char === ',' && !insideQuotes){

row.push(current.trim());
current = '';

}else if(char === '\n' && !insideQuotes){

row.push(current.trim());
rows.push(row);

row = [];
current = '';

}else{

current += char;

}

}

if(current){
row.push(current.trim());
rows.push(row);
}

return rows;

}

async function fetchSecretariatReports(){

try{

const response = await fetch(secretariatCSV);
const data = await response.text();

const reportsFeed = document.getElementById('reportsFeed');

reportsFeed.innerHTML = '';

const reports = parseCSV(data);

/*
REMOVE HEADER ROW
*/

const actualReports = reports.slice(1);

/*
SHOW NEWEST FIRST
*/

actualReports.reverse();

/*
LIMIT TO 5 REPORTS
*/

const latestReports = actualReports.slice(0,5);

latestReports.forEach(report => {

const date = report[0] || '';
const programTitle = report[1] || '';
const programType = report[2] || '';
const whatWentWell = report[3] || '';
const reporter = report[4] || '';

/*
SKIP EMPTY ROWS
*/

if(programTitle.trim() !== ''){

reportsFeed.innerHTML += `

<div class="feed-item">

<h4>${programTitle}</h4>

<p>
<strong>Date:</strong>
${date}
</p>

<p>
<strong>Program Type:</strong>
${programType}
</p>

<p>
<strong>What Went Well:</strong><br>
${whatWentWell}
</p>

<p>
<strong>Reporter:</strong>
${reporter}
</p>

</div>

`;

}

});

}catch(error){

console.error('Secretariat Reports Error:', error);

}

}

/*
LOAD REPORTS
*/

fetchSecretariatReports();

/*
AUTO REFRESH EVERY 30 SECONDS
*/

setInterval(fetchSecretariatReports, 30000);

</script>

</body>
</html>
