
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFC Isiwu Youth Welfare Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Host+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Host Grotesk',sans-serif;
background:
radial-gradient(circle at top left,#eadcff,transparent 30%),
radial-gradient(circle at bottom right,#dbeafe,transparent 30%),
#f8fafc;
color:#202033;
}

header{
position:sticky;
top:0;
z-index:1000;
width:88%;
max-width:820px;
margin:auto;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#4A0754,#0A0016);
border-radius:0 0 18px 18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header-title{
display:flex;
align-items:center;
gap:12px;
color:#fff;
font-family:'Bricolage Grotesque',sans-serif;
font-weight:700;
}

.header-title i{
width:38px;height:38px;border-radius:12px;
display:flex;align-items:center;justify-content:center;
background:rgba(255,255,255,.12);
}

.back-btn{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,.12);
font-size:.8rem;
}

.container{
width:88%;
max-width:820px;
margin:24px auto 40px;
}

.section-title{
display:flex;
align-items:center;
gap:10px;
margin:22px 0 14px;
font-family:'Bricolage Grotesque',sans-serif;
}

.section-title i{
width:34px;height:34px;
display:flex;align-items:center;justify-content:center;
border-radius:12px;
background:#f3e8ff;color:#7c3aed;
}

.dashboard-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.card{
background:linear-gradient(135deg,#fff,#faf5ff);
border:1px solid rgba(74,7,84,.08);
border-radius:22px;
padding:18px;
box-shadow:0 10px 30px rgba(74,7,84,.08);
}

.icon{
width:44px;height:44px;
display:flex;align-items:center;justify-content:center;
border-radius:14px;
margin-bottom:12px;
}

.green{background:#dcfce7;color:#16a34a}
.red{background:#fee2e2;color:#dc2626}
.blue{background:#dbeafe;color:#2563eb}
.purple{background:#ede9fe;color:#7c3aed}

.label{font-size:.72rem;color:#64748b}
.amount{
font-family:'Bricolage Grotesque',sans-serif;
font-weight:800;
font-size:1.15rem;
margin-top:6px;
}

.activities,.chart-box{
background:#fff;
border-radius:24px;
padding:18px;
border:1px solid rgba(74,7,84,.08);
box-shadow:0 10px 30px rgba(74,7,84,.08);
}

.activity{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:16px;
background:#fafafa;
margin-bottom:10px;
}

footer{
text-align:center;
padding:25px;
font-size:.8rem;
color:#64748b;
}

@media(max-width:768px){
.dashboard-grid{gap:12px}
.amount{font-size:1rem}
.header-title span{font-size:.85rem}
}
</style>
</head>
<body>

<header>
<div class="header-title">
<i class="fa-solid fa-heart-pulse"></i>
<span>AFC Isiwu Welfare Dashboard</span>
</div>
<a href="index.html" class="back-btn">Back</a>
</header>

<div class="container">

<div class="section-title">
<i class="fa-solid fa-chart-pie"></i>
<h2>Financial Overview</h2>
</div>

<div class="dashboard-grid">
<div class="card"><div class="icon green"><i class="fa-solid fa-hand-holding-dollar"></i></div><div class="label">Total Contributions</div><div class="amount">₦0</div></div>
<div class="card"><div class="icon red"><i class="fa-solid fa-wallet"></i></div><div class="label">Total Expenses</div><div class="amount">₦0</div></div>
<div class="card"><div class="icon blue"><i class="fa-solid fa-building-columns"></i></div><div class="label">Current Balance</div><div class="amount">₦0</div></div>
<div class="card"><div class="icon purple"><i class="fa-solid fa-users"></i></div><div class="label">Welfare Status</div><div class="amount">Active</div></div>
</div>

<div class="section-title">
<i class="fa-solid fa-clock-rotate-left"></i>
<h2>Recent Activities</h2>
</div>

<div class="activities">
<div class="activity"><span>Contribution Received</span><strong>₦0</strong></div>
<div class="activity"><span>Medical Support</span><strong>₦0</strong></div>
</div>

<div class="section-title">
<i class="fa-solid fa-chart-line"></i>
<h2>Financial Analytics</h2>
</div>

<div class="chart-box">
<p>Insert your Chart.js canvas here.</p>
</div>

</div>

<footer>AFC Isiwu Youth Welfare System © 2026</footer>
   <script>


/*
====================================
GOOGLE SHEET LINKS
====================================
*/


const welfareCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=439044630&single=true&output=csv";


const activitiesCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=493023062&single=true&output=csv";





async function fetchSheetData(){


try{


const response = await fetch(welfareCSV);

const data = await response.text();


const rows =
data.trim()
.split('\n')
.map(r=>r.split(','));



const contributions =
parseFloat(rows[0]?.[1]) || 0;


const expenses =
parseFloat(rows[1]?.[1]) || 0;



const balance =
parseFloat(rows[2]?.[1]) || 0;




document.getElementById("totalContributions")
.innerText =
`₦${contributions.toLocaleString()}`;



document.getElementById("totalExpenses")
.innerText =
`₦${expenses.toLocaleString()}`;



document.getElementById("currentBalance")
.innerText =
`₦${balance.toLocaleString()}`;





/*
=========================
CHART
=========================
*/


const ctx =
document.getElementById("financeChart");



if(window.financeChartInstance){

window.financeChartInstance.destroy();

}




window.financeChartInstance =
new Chart(ctx,{

type:"bar",


data:{


labels:[

"Contributions",

"Expenses",

"Balance"

],


datasets:[{

data:[

contributions,

expenses,

balance

],


borderRadius:14,


backgroundColor:[

"#7c3aed",

"#ef4444",

"#2563eb"

]


}]


},



options:{


responsive:true,


plugins:{


legend:{

display:false

}


},



scales:{


y:{

beginAtZero:true

}


}



}


});







/*
=========================
ACTIVITY FETCH
=========================
*/


const activityResponse =
await fetch(activitiesCSV);


const activityData =
await activityResponse.text();



const activityRows =
activityData
.trim()
.split('\n')
.map(r=>r.split(','));




const feed =
document.getElementById("activityFeed");



feed.innerHTML="";



activityRows
.reverse()
.slice(0,10)
.forEach(row=>{



const purpose=row[0];

const amount=row[1];



if(purpose){



feed.innerHTML += `


<div class="activity-item">


<div class="activity-left">


<div class="activity-icon">

<i class="fa-solid fa-heart"></i>

</div>



<div>


<div class="activity-name">

${purpose}

</div>


<small>
Welfare activity recorded
</small>


</div>


</div>



<div class="activity-amount">

₦${Number(amount).toLocaleString()}

</div>



</div>


`;



}


});





}

catch(error){

console.log(
"Welfare Error:",
error
);

}



}





fetchSheetData();



setInterval(

fetchSheetData,

30000

);



</script>

</body>
</html>
