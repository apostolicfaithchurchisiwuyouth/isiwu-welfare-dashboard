
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Combined Lesson Notes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"DM Sans",sans-serif;
background:#fafafa;
min-height:100vh;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:-120px;
right:-120px;
width:320px;
height:320px;
border-radius:50%;
background:rgba(168,85,247,.08);
filter:blur(90px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
bottom:-150px;
left:-150px;
width:350px;
height:350px;
border-radius:50%;
background:rgba(59,130,246,.08);
filter:blur(90px);
z-index:-1;
}

header{
position:sticky;
top:0;
z-index:1000;
width:88%;
max-width:820px;
margin:auto;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#4A0754,#0A0016);
border-radius:0 0 18px 18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header-title{
display:flex;
align-items:center;
gap:12px;
color:#fff;
font-family:"Bricolage Grotesque",sans-serif;
font-size:.78rem;
font-weight:700;
}

.header-title i{
width:38px;
height:38px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.12);
}

.back-btn{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:999px;
background:#4A0754;
font-size:.8rem;
border:none;
-webkit-tap-highlight-color:transparent;
}

.container{
width:88%;
max-width:820px;
margin:35px auto 50px;
}

.page-intro h2{
font-family:"Bricolage Grotesque",sans-serif;
font-size:18px;
margin-bottom:6px;
color:#0A0016;
}

.page-intro p{
font-size:11px;
color:#64748b;
line-height:1.6;
}

/* =========================
SEARCH BAR
========================= */

.search-wrapper{

margin-top:20px;
position:relative;

}


.search-box{

width:100%;
height:52px;

border-radius:18px;

border:1px solid rgba(15,23,42,.08);

background:rgba(255,255,255,.85);

backdrop-filter:blur(15px);

display:flex;
align-items:center;

padding:0 18px;

gap:12px;

box-shadow:
0 10px 30px rgba(0,0,0,.05);

transition:.3s;

}


.search-box:focus-within{

border-color:#4A0754;

box-shadow:
0 15px 35px rgba(74,7,84,.15);

}



.search-box i{

color:#4A0754;

font-size:16px;

}



.search-box input{

border:none;
outline:none;

width:100%;

background:transparent;

font-family:"DM Sans",sans-serif;

font-size:13px;

color:#0A0016;

}



.search-box input::placeholder{

color:#94a3b8;

}



.search-result{

margin-top:10px;

font-size:11px;

color:#64748b;

padding-left:5px;

}



@media(max-width:600px){

.search-box{

height:48px;

border-radius:16px;

}

.search-box input{

font-size:12px;

}

}

#archiveGrid{
display:grid;
gap:16px;
margin-top:24px;
}

.lesson-card{
background:#fff;
border:1px solid rgba(15,23,42,.08);
border-radius:18px;
padding:18px;
box-shadow:0 8px 25px rgba(15,23,42,.05);
cursor:pointer;
transition:.3s;
outline:none;
-webkit-tap-highlight-color:transparent;
}

.lesson-card:focus,
.lesson-card:active{
outline:none;
box-shadow:0 8px 25px rgba(15,23,42,.05);
}

.lesson-topic{
font-family:"Bricolage Grotesque",sans-serif;
font-size:13px;
font-weight:700;
margin-bottom:8px;
color:#0A0016;
}

.lesson-meta{
display:flex;
gap:12px;
flex-wrap:wrap;
font-size:11px;
color:#64748b;
}

.loading{
padding:30px;
text-align:center;
color:#64748b;
font-size:.7rem;
}

.lesson-viewer{
display:none;
margin-top:25px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.viewer-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.viewer-header h3{
font-family:"Bricolage Grotesque",sans-serif;
font-size:15px;
}

.close-btn{
border:none;
background:#4A0754;
font-size:11px;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
outline:none;
-webkit-tap-highlight-color:transparent;
}


.lesson-info{
font-size:12px;
line-height:1.8;
color:#334155;
}


.tabs{
display:flex;
gap:10px;
margin:20px 0;
}


.tab-btn{
border:none;
padding:10px 18px;
border-radius:30px;
font-size:11px;
background:#eee;
cursor:pointer;
outline:none;
-webkit-tap-highlight-color:transparent;
}


.tab-btn.active{
background:#4A0754;
color:white;
}


.tab-content{
display:none;
}


.tab-content.active{
display:block;
}


.detail-box{
background:#f8fafc;
padding:14px;
border-radius:15px;
margin-bottom:12px;
}


.detail-box h4{
font-size:12px;
color:#4A0754;
margin-bottom:5px;
}


.detail-box p{
font-size:12px;
line-height:1.7;
}


.audio-btn{
display:inline-flex;
align-items:center;
gap:8px;
padding:10px 15px;
background:#0A0016;
color:white;
border-radius:30px;
margin-bottom:10px;
text-decoration:none;
font-size:12px;
outline:none;
-webkit-tap-highlight-color:transparent;
}

@media(max-width:600px){

.container{
width:88%;
}

.page-intro h2{
font-size:18px;
}

.page-intro p{
font-size:12px;
}

.lesson-card{
padding:15px;
}

.lesson-topic{
font-size:14px;
}

}
</style>
</head>
<body>

<header>
<div class="header-title">
<i class="fas fa-book-open"></i>
<span>Lesson Notes</span>
</div>

<a href="lessons.html" class="back-btn">
← Back
</a>
</header>

<div class="container">


<div class="search-wrapper">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input 
type="text"
id="lessonSearch"
placeholder="Search lesson topic or ID..."
oninput="searchLessons()"
/>

</div>


<div class="search-result" id="searchResult">

</div>


</div>



<div id="archiveGrid">

<div class="loading">
Loading lessons...
</div>

</div>


<div class="lesson-viewer" id="lessonViewer">

<div class="viewer-header">

<h3 id="viewerTitle">
Lesson Details
</h3>

<button class="close-btn" onclick="closeLesson()">
Close
</button>

</div>


<div class="lesson-info" id="lessonDetails">

</div>


<div class="tabs">

<button class="tab-btn active" onclick="showTab('senior')">
Senior
</button>


<button class="tab-btn" onclick="showTab('junior')">
Junior
</button>


</div>


<div id="senior" class="tab-content active">

</div>


<div id="junior" class="tab-content">

</div>


</div>

</div>

<script>

const LESSON_URL =
"https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec?action=getLessons";


let allLessons = [];



async function loadLessons(){

const grid =
document.getElementById("archiveGrid");


try{


const response =
await fetch(LESSON_URL);


const data =
await response.json();



allLessons =
data.lessons;



grid.innerHTML="";



allLessons.reverse().forEach(lesson=>{


grid.innerHTML += `

<div class="lesson-card"
onclick="openLesson('${lesson.id}')">


<div class="lesson-topic">

${lesson.topic}

</div>


<div class="lesson-meta">

<span>
Uploaded on: ${lesson.date}
</span>


<span>
📝 ID: ${lesson.id}
</span>


</div>


</div>

`;

});


}catch(error){


grid.innerHTML =
"Unable to load lessons";


}


}

function searchLessons(){


const value =
document
.getElementById("lessonSearch")
.value
.toLowerCase()
.trim();



const grid =
document.getElementById("archiveGrid");



let filtered =
allLessons.filter(lesson=>{


return (

String(lesson.id)
.toLowerCase()
.includes(value)

||

String(lesson.topic)
.toLowerCase()
.includes(value)

);


});



grid.innerHTML="";



if(filtered.length === 0){


grid.innerHTML = `

<div class="loading">

No lesson found.

</div>

`;


document.getElementById("searchResult")
.innerHTML =
"0 lessons found";


return;

}



filtered.forEach(lesson=>{


grid.innerHTML += `


<div class="lesson-card"

onclick="openLesson('${lesson.id}')">


<div class="lesson-topic">

${lesson.topic}

</div>



<div class="lesson-meta">


<span>
Uploaded on: ${lesson.date}
</span>



<span>
📝 ${lesson.id}
</span>


</div>


</div>


`;


});



document.getElementById("searchResult")
.innerHTML =
filtered.length + " lessons found";


}




function openLesson(id){


const lesson =
allLessons.find(
item=>item.id == id
);



if(!lesson) return;



document.getElementById("lessonViewer")
.style.display="block";



document.getElementById("viewerTitle")
.innerHTML =
lesson.topic;



document.getElementById("lessonDetails")
.innerHTML = "";



document.getElementById("senior")
.innerHTML = `


<div class="detail-box">

<h4>Memory Verse</h4>

<p>
${lesson.seniorMemoryVerse}
</p>

</div>



<a class="audio-btn"
href="${lesson.seniorYorubaAudio}"
target="_blank">

<i class="fa-solid fa-volume-high"></i>

Play Yoruba Memory Verse Audio

</a><br>



<div class="detail-box">

<h4>Bible Text</h4>

<p>
${lesson.seniorBibleText}
</p>

</div>



<div class="detail-box">

<h4>Lesson</h4>

<p>
${lesson.seniorLesson}
</p>

</div>


`;





document.getElementById("junior")
.innerHTML = `


<div class="detail-box">

<h4>Memory Verse</h4>

<p>
${lesson.juniorMemoryVerse}
</p>

</div>



<a class="audio-btn"
href="${lesson.juniorYorubaAudio}"
target="_blank">

<i class="fa-solid fa-volume-high"></i>

Play Yoruba Memory Verse Audio

</a><br>




<div class="detail-box">

<h4>Bible Text</h4>

<p>
${lesson.juniorBibleText}
</p>

</div>



<div class="detail-box">

<h4>Lesson</h4>

<p>
${lesson.juniorLesson}
</p>

</div>


`;


window.scrollTo({
top:
document.getElementById("lessonViewer")
.offsetTop - 20,
behavior:"smooth"
});


}





function showTab(tab){


document.querySelectorAll(".tab-content")
.forEach(x=>x.classList.remove("active"));


document.querySelectorAll(".tab-btn")
.forEach(x=>x.classList.remove("active"));



document.getElementById(tab)
.classList.add("active");



event.target.classList.add("active");


}





function closeLesson(){

document.getElementById("lessonViewer")
.style.display="none";

}



loadLessons();

</script>

</body>
</html>
