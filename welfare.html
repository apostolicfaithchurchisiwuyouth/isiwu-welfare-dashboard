
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFC Isiwu Welfare Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'DM Sans',sans-serif;
background:
radial-gradient(circle at top left,#eadcff,transparent 30%),
radial-gradient(circle at bottom right,#dbeafe,transparent 30%),
#f8fafc;
color:#202033;
}

#dashboardContent{
display:none;
}

#loginOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
padding:20px;
}
  
.login-modal{

width:100%;
max-width:390px;
background:#ffffff;
border-radius:18px;
padding:32px;
text-align:center;
box-shadow:0 25px 70px rgba(0,0,0,.25);
border:1px solid rgba(74,7,84,.15);
}

.login-logo{

width:62px;
height:62px;

border-radius:16px;

display:flex;
justify-content:center;
align-items:center;
font-size:24px;
background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

color:white;

margin:0 auto 18px;

}

.login-modal h2{

font-size:20px;

white-space:nowrap;

color:#0a0016;

font-weight:700;

}

.login-subtitle{

font-size:12px;

color:#6b7280;

margin-bottom:20px;

}

.login-modal input{

width:100%;

padding:13px 15px;

border-radius:12px;

border:1px solid #ddd6e5;

background:#fafafa;

color:#0a0016;

font-size:14px;

outline:none;

margin-bottom:14px;

}


.login-modal input::placeholder{

color:#6b5b70;

opacity:1;

}


.login-modal input:focus{

border-color:#4a0754;

box-shadow:
0 0 0 3px rgba(74,7,84,.12);

}
  

#loginBtn{

width:100%;

padding:13px;

border-radius:12px;

border:none;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

color:white;

font-weight:600;

cursor:pointer;

}
  
#loginError{
margin-top:15px;
color:#ff6b6b;
font-size:14px;
}

@media(max-width:600px){

.login-modal{

max-width:340px;

padding:25px;

}


.login-logo{
width:55px;

height:55px;

font-size:21px;
}

.login-modal h2{
font-size:18px;
}

.login-subtitle{
font-size:12px;
}

.login-modal input{
padding:13px;
font-size:14px;
}

#loginBtn{
padding:13px;
font-size:14px;
}

}

header{
position:sticky;
top:0;
z-index:1000;
width:88%;
max-width:820px;
margin:auto;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#4A0754,#0A0016);
border-radius:0 0 18px 18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header-title{
display:flex;
align-items:center;
gap:12px;
color:#fff;
font-family:Bricolage Grotesque;
font-size:.75rem;
font-weight:700;
}

.header-title i{
width:38px;height:38px;border-radius:12px;
display:flex;align-items:center;justify-content:center;
background:rgba(255,255,255,.12);
}

.back-btn{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:999px;
background:#4A0754;
font-size:.8rem;
outline:none;
border:none;
-webkit-tap-highlight-color: transparent;
-webkit-touch-callout: none;
user-select: none;
}

.container{
width:88%;
max-width:820px;
margin:24px auto 40px;
}

.section-title{
display:flex;
align-items:center;
gap:10px;
margin:22px 0 14px;
font-weight:700;
}

.section-title i{
width:34px;height:34px;
display:flex;align-items:center;justify-content:center;
border-radius:12px;
background:#f3e8ff;color:#7c3aed;
}

.dashboard-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.card{
background:linear-gradient(135deg,#fff,#faf5ff);
border:1px solid rgba(74,7,84,.08);
border-radius:22px;
padding:18px;
box-shadow:0 10px 30px rgba(74,7,84,.08);
transition:.3s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:
0 15px 40px rgba(74,7,84,.12);
}
  
.icon{
width:35px;height:35px;
display:flex;align-items:center;justify-content:center;
border-radius:14px;
margin-bottom:12px;
}

.green{background:#dcfce7;color:#16a34a}
.red{background:#fee2e2;color:#dc2626}
.blue{background:#dbeafe;color:#2563eb}
.purple{background:#ede9fe;color:#7c3aed}

.label{font-size:.7rem;color:#64748b}

.amount{
font-weight:800;
font-size:1.15rem;
margin-top:6px;
}

.activities,.chart-box{
background:#fff;
border-radius:24px;
padding:24px;
border:1px solid rgba(74,7,84,.08);
box-shadow:0 10px 30px rgba(74,7,84,.08),
0 1px 3px rgba(0,0,0,.04);
}

table{width:100%;border-collapse:collapse}
td{padding:14px;border-bottom:1px solid #eee}

footer{
text-align:center;
padding:25px;
font-size:.8rem;
color:#64748b;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.card-header h3{
font-size:.9rem;
font-weight:700;
margin-bottom:4px;
}

.card-header p{
font-size:.7rem;
color:#64748b;
}

.header-badge{
padding:8px 14px;
border-radius:999px;
background:#f3e8ff;
color:#7c3aed;
font-size:.7rem;
font-weight:600;
}

.modern-table{
width:100%;
border-collapse:separate;
border-spacing:0 10px;
}

.modern-table tr{
background:#fafafa;
transition:.3s;
}

.modern-table tr:hover{
background:#f4f4f5;
transform:translateY(-2px);
}

.modern-table td{
padding:14px;
font-size:.7rem;
border:none;
}

.modern-table td:first-child{
border-radius:12px 0 0 12px;
font-weight:500;
}

.modern-table td:last-child{
border-radius:0 12px 12px 0;
font-weight:700;
color:#16a34a;
text-align:right;
}

@media(max-width:768px){
.dashboard-grid{gap:12px}
.amount{font-size:.9rem}
.header-title span{font-size:.8rem}
.container,header{width:88%}
}
</style>
</head>
<body>

<div id="loginOverlay">

<div class="login-modal">

<div class="login-logo">
<i class="fas fa-hand-holding-heart"></i>
</div>

<h2>Welfare Dashboard</h2>

<p class="login-subtitle">
Authorized Personnel Only
</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<p id="loginError"></p>

</div>

</div>

<div id="dashboardContent">

<header>
<div class="header-title">
<i class="fas fa-hand-holding-heart"></i>
<span>Welfare Report</span>
</div>
<button id="logoutBtn" class="back-btn">
Logout
</button>
</header>

<div class="container">

<div class="section-title">
<i class="fas fa-chart-line"></i>
<span>Financial Overview</span>
</div>

<div class="dashboard-grid">

<div class="card">
<div class="icon green"><i class="fas fa-wallet"></i></div>
<div class="label">Total Contributions</div>
<div class="amount" id="totalContributions">Updating...</div>
</div>

<div class="card">
<div class="icon red"><i class="fas fa-money-bill-wave"></i></div>
<div class="label">Total Expenses</div>
<div class="amount" id="totalExpenses">Updating...</div>
</div>

<div class="card">
<div class="icon blue"><i class="fas fa-piggy-bank"></i></div>
<div class="label">Current Balance</div>
<div class="amount" id="currentBalance">Updating...</div>
</div>

<div class="card">
<div class="icon purple"><i class="fas fa-shield-heart"></i></div>
<div class="label">Welfare Status</div>
<div class="amount">Active</div>
</div>

</div>

<div class="activities" style="margin-top:30px;">

<div class="card-header">
<div>
<h3>Welfare Activities</h3>
<p>Latest transactions and updates</p>
</div>

<div class="header-badge">
10 Recent
</div>
</div>

<table class="modern-table">
<tbody id="activityTable"></tbody>
</table>

</div>

<div class="chart-box" style="margin-top:30px;">

<div class="card-header">
<div>
<h3>Financial Analytics</h3>
<p>Overview</p>
</div>

<div class="header-badge">
Live Data
</div>
</div>

<canvas id="financeChart"></canvas>

</div></div>

<script>
const welfareCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=439044630&single=true&output=csv';
const activitiesCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=493023062&single=true&output=csv';

async function load(){
try{
const rows=(await(await fetch(welfareCSV)).text()).trim().split('\n').map(r=>r.split(','));

totalContributions.innerText='₦'+Number(rows[0]?.[1]||0).toLocaleString();
totalExpenses.innerText='₦'+Number(rows[1]?.[1]||0).toLocaleString();
currentBalance.innerText='₦'+Number(rows[2]?.[1]||0).toLocaleString();

const activity=(await(await fetch(activitiesCSV)).text()).trim().split('\n').map(r=>r.split(','));

activityTable.innerHTML='';
activity.reverse().slice(0,10).forEach(r=>{
activityTable.innerHTML += `<tr><td>${r[0]||''}</td><td>₦${Number(r[1]||0).toLocaleString()}</td></tr>`;
});

const c=document.getElementById('financeChart');
if(window.fc) fc.destroy();

window.fc=new Chart(c,{
type:'bar',
data:{
labels:['Contributions','Expenses','Balance'],
datasets:[{
data:[Number(rows[0]?.[1]||0),Number(rows[1]?.[1]||0),Number(rows[2]?.[1]||0)]
}]
},
options:{plugins:{legend:{display:false}},responsive:true}
});

}catch(e){console.error(e)}
}

load();
setInterval(load,30000);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";
  
let attempts = 0;

window.addEventListener("load",()=>{
  
if(
sessionStorage.getItem("welfareLoggedIn")
==="true"
){

document.getElementById(
"dashboardContent"
).style.display="block";

document.getElementById(
"loginOverlay"
).style.display="none";

}

});

document
.getElementById("loginBtn")
.addEventListener(
"click",
loginUser
);

async function loginUser(){

const username =
document.getElementById(
"username"
).value.trim();

const password =
document.getElementById(
"password"
).value.trim();

const error =
document.getElementById(
"loginError"
);

error.innerText="";

if(!username || !password){

error.innerText =
"Enter username and password";

return;

}

document.getElementById(
"loginBtn"
).innerText =
"Checking...";

try{

const response =
await fetch(
SCRIPT_URL,
{
method:"POST",
body:JSON.stringify({
username,
password
})
}
);

const result =
await response.json();

if(result.success){

sessionStorage.setItem(
"welfareLoggedIn",
"true"
);

sessionStorage.setItem(
"username",
result.user
);

document.getElementById(
"loginOverlay"
).style.display="none";

document.getElementById(
"dashboardContent"
).style.display="block";

}else{

attempts++;

error.innerText =
"Invalid Login Details";

if(attempts >= 3){

error.innerText =
"Access Denied. Redirecting...";

setTimeout(()=>{

window.location.href =
"index.html";

},3000);

}

}

}catch(err){

error.innerText =
"Connection Error";

}

document.getElementById(
"loginBtn"
).innerText =
"Login";

}


const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", function(){

    // remove saved login session
    sessionStorage.removeItem("welfareLoggedIn");
    sessionStorage.removeItem("username");

    // hide dashboard
    document.getElementById(
        "dashboardContent"
    ).style.display = "none";


    // show login screen again
    document.getElementById(
        "loginOverlay"
    ).style.display = "flex";


    // clear inputs
    document.getElementById(
        "username"
    ).value = "";

    document.getElementById(
        "password"
    ).value = "";


});

</script>

</body>
</html>
