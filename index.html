<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isiwu Youth Welfare Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #0d47a1, #1565c0);
      color: white;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    header p {
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      font-size: 1rem;
      color: #555;
      margin-bottom: 15px;
    }

    .card .amount {
      font-size: 2rem;
      font-weight: bold;
    }

    .green {
      border-left: 8px solid #2e7d32;
    }

    .red {
      border-left: 8px solid #c62828;
    }

    .blue {
      border-left: 8px solid #1565c0;
    }

    .section {
      margin-top: 40px;
    }

    .section h2 {
      margin-bottom: 20px;
      color: #0d47a1;
    }

    .activities {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #1565c0;
      color: white;
    }

    canvas {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    footer {
      margin-top: 50px;
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .loading {
      text-align: center;
      margin-top: 40px;
      color: #555;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.5rem;
      }

      .card .amount {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Isiwu Youth Welfare Dashboard</h1>
    <p>Transparency • Accountability • Welfare Support</p>
  </header>

  <div class="container">

    <div class="cards">
      <div class="card green">
        <h2>Total Contributions</h2>
        <div class="amount" id="totalContributions">₦0</div>
      </div>

      <div class="card red">
        <h2>Total Expenses</h2>
        <div class="amount" id="totalExpenses">₦0</div>
      </div>

      <div class="card blue">
        <h2>Current Balance</h2>
        <div class="amount" id="currentBalance">₦0</div>
      </div>
    </div>

    <div class="section">
      <h2>Financial Overview</h2>
      <canvas id="financeChart"></canvas>
    </div>

    <div class="section">
      <h2>Recent Welfare Activities</h2>
      <div class="activities">
        <table>
          <thead>
            <tr>
              <th>Activity</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="activityTable">
            <tr>
              <td>Loading...</td>
              <td>₦0</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="loading" id="loadingText">
      Connecting to Google Sheets...
    </div>

  </div>

  <footer>
    Isiwu Youth Welfare Department Dashboard
  </footer>

  <script>

    // ==============================================
    // IMPORTANT:
    // REPLACE THIS WITH YOUR GOOGLE SHEETS CSV LINK
    // ==============================================

    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=439044630&single=true&output=csv";

    async function fetchSheetData() {
      try {
        const response = await fetch(sheetURL);
        const data = await response.text();

        const rows = data.split('\n').map(row => row.split(','));

        // ==============================================
        // EXPECTED GOOGLE SHEET STRUCTURE
        // ==============================================
        // Row 1: TOTAL CONTRIBUTIONS, amount
        // Row 2: TOTAL EXPENSES, amount
        // Row 3: CURRENT BALANCE, amount
        // Row 4+: Activities
        // ==============================================

        const contributions = rows[0][1] || 0;
        const expenses = rows[1][1] || 0;
        const balance = rows[2][1] || 0;

        document.getElementById('totalContributions').innerText = `₦${Number(contributions).toLocaleString()}`;
        document.getElementById('totalExpenses').innerText = `₦${Number(expenses).toLocaleString()}`;
        document.getElementById('currentBalance').innerText = `₦${Number(balance).toLocaleString()}`;

        // ==============================================
        // CHART
        // ==============================================

        const ctx = document.getElementById('financeChart');

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Contributions', 'Expenses', 'Balance'],
            datasets: [{
              label: 'Financial Overview',
              data: [contributions, expenses, balance]
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                display: false
              }
            }
          }
        });

        // ==============================================
        // ACTIVITIES TABLE
        // ==============================================

        const activityTable = document.getElementById('activityTable');
        activityTable.innerHTML = '';

        for (let i = 3; i < rows.length; i++) {
          if (rows[i][0]) {
            activityTable.innerHTML += `
              <tr>
                <td>${rows[i][0]}</td>
                <td>₦${Number(rows[i][1]).toLocaleString()}</td>
              </tr>
            `;
          }
        }

        document.getElementById('loadingText').style.display = 'none';

      } catch (error) {
        console.error(error);
        document.getElementById('loadingText').innerText = 'Failed to connect to Google Sheets.';
      }
    }

    fetchSheetData();

  </script>

</body>
</html>
