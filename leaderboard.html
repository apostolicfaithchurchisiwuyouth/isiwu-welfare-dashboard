
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"DM Sans",sans-serif;
background:#fafafa;
padding-bottom:40px;
}


header{
width:90%;
max-width:850px;
margin:auto;
padding:16px 18px;

background:linear-gradient(135deg,#4A0754,#16001d);

border-radius:0 0 24px 24px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}


.title{
font-family:"Bricolage Grotesque";
font-size:.9rem;
display:flex;
gap:10px;
align-items:center;
}


.title i{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,.15);
}


.back{
color:white;
text-decoration:none;
font-size:.75rem;
background:rgba(255,255,255,.15);
padding:9px 14px;
border-radius:30px;
}


.container{
width:90%;
max-width:850px;
margin:25px auto;
}


.card{
background:white;
border-radius:24px;
padding:20px;
margin-bottom:18px;
box-shadow:0 15px 40px rgba(0,0,0,.07);
}


.card-title{
font-family:"Bricolage Grotesque";
font-size:.95rem;
color:#4A0754;
margin-bottom:15px;
}


.subtitle{
font-size:.75rem;
color:#64748b;
margin-bottom:15px;
}



.top-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}


.top{
text-align:center;
padding:15px 8px;
border-radius:18px;
background:#faf5ff;
}


.medal{
font-size:24px;
}


.top h3{
font-family:"Bricolage Grotesque";
font-size:.75rem;
margin-top:8px;
}


.top p{
font-size:.7rem;
color:#64748b;
margin-top:5px;
}


.points{
font-weight:700;
color:#4A0754;
font-size:.75rem;
}



.list{
max-height:430px;
overflow-y:auto;
}


.item{
display:flex;
justify-content:space-between;
align-items:center;

padding:14px;

border-radius:18px;

background:#fafafa;

margin-bottom:10px;
}


.left{
display:flex;
align-items:center;
gap:12px;
}


.rank{
width:34px;
height:34px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:#f3e8ff;
color:#4A0754;
font-weight:700;
font-size:.8rem;
}


.name{
font-weight:600;
font-size:.8rem;
}


.id{
font-size:.7rem;
color:#64748b;
}


.score{
font-family:"Bricolage Grotesque";
font-size:.8rem;
color:#4A0754;
}


@media(max-width:600px){

.top-grid{
grid-template-columns:1fr;
}

header{
width:94%;
}

.container{
width:94%;
}

}

</style>

</head>

<body>


<header>

<div class="title">
<i class="fa-solid fa-ranking-star"></i>
Leaderboard
</div>

<a class="back" href="index.html">
Back
</a>

</header>



<div class="container">


<div class="card">

<div class="card-title">
Top 3 Performance
</div>

<div class="top-grid" id="topThree">
</div>

</div>



<div class="card">

<div class="card-title">
Overall Leaderboard
</div>

<div class="subtitle">
Total accumulated points ranking
</div>

<div class="list" id="leaderboard">

Loading...

</div>

</div>



<div class="card">

<div class="card-title">
Most Improved
</div>

<div class="subtitle">
Members with strong point growth
</div>

<div class="list" id="improved">

Loading...

</div>

</div>



</div>



<script>

const API =
"https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";


async function loadLeaderboard(){


const res = await fetch(API+"?action=getLeaderboard");

const data = await res.json();


const board = data.leaderboard || [];


renderTop(board.slice(0,3));

renderList(board);


renderImproved(board);


}



function renderTop(top){

const box=document.getElementById("topThree");

box.innerHTML="";


top.forEach((m,i)=>{

let medal =
i===0 ? "🥇":
i===1 ? "🥈":"🥉";


box.innerHTML += `

<div class="top">

<div class="medal">${medal}</div>

<h3>${m.name}</h3>

<p>${m.memberId}</p>

<div class="points">
${m.points} pts
</div>

</div>

`;

});

}



function renderList(data){

const box=document.getElementById("leaderboard");

box.innerHTML="";


data.forEach((m,i)=>{


box.innerHTML += `

<div class="item">

<div class="left">

<div class="rank">${i+1}</div>

<div>

<div class="name">${m.name}</div>

<div class="id">${m.memberId}</div>

</div>

</div>


<div class="score">
${m.points} pts
</div>


</div>

`;

});


}



function renderImproved(data){

const box=document.getElementById("improved");

box.innerHTML="";


data.slice(0,10).forEach((m,i)=>{


box.innerHTML += `

<div class="item">

<div class="left">

<div class="rank">
↑
</div>

<div>

<div class="name">${m.name}</div>

<div class="id">
${m.memberId}
</div>

</div>

</div>


<div class="score">
${m.points}
</div>


</div>

`;

});


}


loadLeaderboard();


</script>


</body>
</html>
