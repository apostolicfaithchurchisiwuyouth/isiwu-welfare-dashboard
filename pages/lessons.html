<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Weekly Lessons | AFC Isiwu Youth</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="../css/lessons.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

    <!-- HEADER -->

    <header class="main-header">

        <div class="header-title">

            <i class="fas fa-book-open"></i>

            <span>Weekly Lessons</span>

        </div>

        <a href="index.html" class="back-btn">

            <i class="fas fa-arrow-left"></i>

            Back

        </a>

    </header>

    <!-- PAGE -->

    <main class="lessons-page">

        <!-- HERO -->

        <section class="hero-section">

            <div class="hero-badge">

                <i class="fas fa-bookmark"></i>

                Sunday School For This Week

            </div>

            <h1 id="topic">

                Loading lesson...

            </h1>

            <p id="meta"></p>

        </section>

        <!-- TABS -->

        <section class="tabs">

            <button class="tab active" data-class="Senior">

                Senior

            </button>

            <button class="tab" data-class="Junior">

                Junior

            </button>

            <button class="tab" data-class="Elementary">

                Elementary

            </button>

        </section>

        <!-- CONTENT -->

        <section class="lesson-card">

            <div class="lesson-grid">

                <div class="info-card">

                    <h3>

                        Bible Text

                    </h3>

                    <div class="lesson-text" id="bibleText"></div>

                </div>

                <div class="info-card">

                    <h3>

                        Memory Verse

                    </h3>

                    <div class="lesson-text" id="memoryVerse"></div>

                </div>

            </div>

            <!-- AUDIO -->

            <div
                id="yorubaAudioContainer"
                class="audio-card"
            >

                <div class="section-title">

                    Memory Verse In Yoruba

                </div>

                <audio
                    controls
                    preload="none"
                    id="yorubaAudioPlayer"
                >

                    <source
                        id="yorubaAudioSource"
                        src=""
                        type="audio/mpeg"
                    >

                </audio>

            </div>

            <!-- LESSON -->

            <div class="content-card">

                <div class="section-title">

                    Combined Lesson Note

                </div>

                <div
                    class="lesson-text"
                    id="summary"
                ></div>

            </div>

            <!-- DISCUSSION -->

            <div class="content-card">

                <div class="section-title">

                    Discussion

                </div>

                <div
                    class="lesson-text"
                    id="discussion"
                ></div>

            </div>

        </section>

        <!-- ARCHIVE -->

        <section class="archive-card">

            <div class="archive-icon">

                <i class="fas fa-book"></i>

            </div>

            <div class="archive-content">

                <h3>

                    Combined Lesson Archive

                </h3>

                <p>

                    Browse all combined lesson notes and Yoruba audio memory verses.

                </p>

            </div>

            <a
                href="lesson-archive.html"
                class="archive-btn"
            >

                Open Archive

            </a>

        </section>

    </main>

    <script src="../js/lessons.js"></script>

</body>

</html>
