<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>



<title>Weekly Lessons | AFC Isiwu Youth</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>



<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

font-family:'DM Sans',sans-serif;

font-weight:400;

position:relative;

overflow-x:hidden;

background:#fafafa;

color:#222;

}

body::before{

content:"";

position:fixed;

top:-120px;

right:-120px;

width:320px;

height:320px;

border-radius:50%;

background:rgba(168,85,247,.08);

filter:blur(80px);

pointer-events:none;

z-index:-1;

}

body::after{

content:"";

position:fixed;

bottom:-150px;

left:-150px;

width:350px;

height:350px;

border-radius:50%;

background:rgba(59,130,246,.08);

filter:blur(90px);

pointer-events:none;

z-index:-1;

}

h1,h2,h3{

font-family:'Bricolage Grotesque',sans-serif;

}



/* HEADER */

header{

position:sticky;

top:0;



width:88%;

max-width:820px;


margin:0 auto;



padding:14px 18px;



display:flex;

justify-content:space-between;

align-items:center;



background: linear-gradient(135deg,#4A0754,#0A0016);



backdrop-filter:blur(15px);

-webkit-backdrop-filter:blur(15px);



border:1px solid rgba(255,255,255,.3);



border-radius: 0 0 15px 15px;



box-shadow:

0 8px 30px rgba(0,0,0,.08);



z-index:1000;

transition:all .3s ease;

}



header h2{

font-size:0.9rem;

color:white;

}



.back{

color:white;

text-decoration:none;

font-size:0.8rem;

background:#4A0754;

padding:10px 14px;

border-radius:50px;

-webkit-tap-highlight-color: transparent;

-webkit-touch-callout: none;

outline:none;

user-select:none;

}

.archive-card{

display:flex;

align-items:center;

padding:18px 22px;

background:#fff;

border:1px solid rgba(15,23,42,.08);

border-radius:20px;

box-shadow:
0 8px 30px rgba(15,23,42,.05);

margin-top:24px;

gap:18px;

}

.archive-card-icon{

width:50px;

height:50px;

min-width:50px;

display:flex;

align-items:center;

justify-content:center;

border-radius:14px;

background:#f8f7ff;

color:#4A0754;

font-size:18px;

}

.archive-card-content{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

}

.archive-card-content h3{

margin:0 0 4px;

font-family:"Bricolage Grotesque",sans-serif;

font-size:15px;

font-weight:700;

color:#0A0016;

}

.archive-card-content p{

margin:0;

font-size:12px;

line-height:1.6;

color:#64748b;

}

.archive-card-btn{

margin-left:auto;

padding:11px 18px;

border-radius:12px;

background:#0f172a;

color:#fff;

text-decoration:none;

font-family:"Bricolage Grotesque",sans-serif;

font-size:12px;

font-weight:600;

white-space:nowrap;

transition:.3s;

}

.archive-card-btn:hover{

transform:translateY(-2px);

background:#020617;

}
  
@media(max-width:600px){

.archive-card{

display:block;

padding:16px;

}

.archive-header{

display:flex;

align-items:center;

gap:10px;

margin-bottom:10px;

}

.archive-card-content{

width:100%;

}

.archive-card-content h3{

margin:0;

font-size:14px;

font-family:"Bricolage Grotesque",sans-serif;

}

.archive-card-content p{

margin-top:10px;

font-size:11px;

line-height:1.6;

}

.archive-card-btn{

width:100%;

margin-top:14px;

display:flex;

justify-content:center;

align-items:center;

}

}

  
/* CONTAINER */



.container{

width:88%;

max-width:820px;

margin:auto;

padding:30px auto;

}



/* CARD */

.card{

background:white;

border-radius:15px;

padding:22px;

box-shadow:0 10px 25px rgba(0,0,0,0.06);

margin-bottom:20px;

}



/* TABS */

.tabs{

display:flex;

gap:10px;

flex-wrap:wrap;

margin-bottom:20px;

}



.tab{

padding:8px 13px;

border:none;

border-radius:999px;

cursor:pointer;

background:#e7e3e9;

color:#333;

font-weight:600;

font-size:0.75rem;

transition:all .25s ease;



-webkit-tap-highlight-color: rgba(0,0,0,0);

-webkit-touch-callout: none;

outline:none;

}



.tab.active{

background:#0a0016;

color:white;

}



/* SECTIONS */

.section-title{

font-size:0.85rem;

margin-bottom:8px;

color:#4a0754;

font-weight:700;

}



.text{

font-size:0.8rem;

line-height:1.8;

color:#333;

white-space:pre-wrap;

}



/* TOP INFO */

.topic{

font-size:1.1rem;

font-weight:800;

margin-bottom:10px;

}



.meta{

font-size:0.85rem;

color:#666;

margin-bottom:15px;

}



/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}



.audio-title{

font-size:0.75rem;

font-weight:700;

color:#4a0754;

margin-top:15px;

margin-bottom:10px;

}



#yorubaAudioContainer{

margin-top:15px;

padding:14px;

background:#fafafa;

border-radius:12px;

}



#yorubaAudioPlayer{

width:100%;

}



@media(max-width:768px){
  
.grid{grid-template-columns:1fr;}

}

</style>

</head>



<body>

  



<header>

<h2>Weekly Lessons</h2>

<a class="back" href="index.html">← Back</a>

</header>


<br>


<div class="container">
  
<div class="tabs">

<button class="tab active" onclick="switchClass('Senior')" style="font-family:Bricolage Grotesque;">Senior</button>

<button class="tab" onclick="switchClass('Junior')" style="font-family:Bricolage Grotesque;">Junior</button>

<button class="tab" onclick="switchClass('Elementary')" style="font-family:Bricolage Grotesque;">Elementary</button>

</div>



<div class="card">



<div class="topic" id="topic">Loading...</div>

<div class="meta" id="meta"></div>



<div class="grid">



<div>

<div class="section-title">Bible Text</div>

<div class="text" id="bibleText"></div>

</div>



<div>

<div class="section-title">Memory Verse</div>

<div class="text" id="memoryVerse"></div>

</div>





<div id="yorubaAudioContainer" style="display:none;">



<div class="audio-title">

Memory Verse In Yoruba (Audio)

</div>



<audio

id="yorubaAudioPlayer"

controls

preload="none">



<source

id="yorubaAudioSource"

src=""

type="audio/mpeg">



</audio>



</div>



</div>



<br>



<div class="section-title">Combined Lesson Note</div>

<div class="text" id="summary"></div>



<br>



<div class="section-title">Discussion</div>

<div class="text" id="discussion"></div>



</div>


<div class="archive-card">

<div class="archive-header">

<div class="archive-card-icon">
<i class="fas fa-book-open"></i>
</div>

<div class="archive-card-content">

<h3>All Combined Lessons</h3>

<p>
Browse all available combined lesson notes and Yoruba audio memory verses.
</p>

</div>

</div>

<a href="lesson-archive.html"
class="archive-card-btn">

Open All Combined Lessons

</a>

</div>

</div>


</div>



<script>



// 🔴 YOUR CSV (UNCHANGED)

const weeklyLessonCSV =

"https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=201183837&single=true&output=csv";



let lessons = [];



async function loadLessons(){



const res = await fetch(weeklyLessonCSV);

const csv = await res.text();



const result = Papa.parse(csv, {

header:true,

skipEmptyLines:true

});



lessons = result.data;



switchClass('Senior');

}



function switchClass(cls){



const lesson = lessons.find(l => l.Class?.trim() === cls);



if(!lesson) return;



document.getElementById("topic").innerText = lesson.Topic || "";

document.getElementById("meta").innerText = cls;



document.getElementById("bibleText").innerText = lesson.BibleText || "";

document.getElementById("memoryVerse").innerText = lesson.MemoryVerse || "";



const audioContainer =

document.getElementById("yorubaAudioContainer");



const audioPlayer =

document.getElementById("yorubaAudioPlayer");



const audioSource =

document.getElementById("yorubaAudioSource");



if(

lesson.YorubaAudio &&

lesson.YorubaAudio.trim() !== ""

){



audioSource.src =

lesson.YorubaAudio;



audioPlayer.load();



audioContainer.style.display = "block";



}else{



audioContainer.style.display = "none";



audioSource.src = "";



audioPlayer.load();



}

document.getElementById("summary").innerHTML = lesson.Summary || "";

document.getElementById("discussion").innerText = lesson.Discussion || "";



// tabs UI

document.querySelectorAll(".tab").forEach(t => {

t.classList.remove("active");

if(t.innerText === cls) t.classList.add("active");

});

}



loadLessons();

  

window.addEventListener('scroll',()=>{



const header =

document.querySelector('header');



if(window.scrollY > 50){



header.style.padding = "10px 18px";



}else{



header.style.padding = "14px 18px";



}



});

</script>



</body>

</html>
