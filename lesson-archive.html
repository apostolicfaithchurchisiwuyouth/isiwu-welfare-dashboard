
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"DM Sans",sans-serif;
background:#fafafa;
min-height:100vh;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:-120px;
right:-120px;
width:320px;
height:320px;
border-radius:50%;
background:rgba(168,85,247,.08);
filter:blur(90px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
bottom:-150px;
left:-150px;
width:350px;
height:350px;
border-radius:50%;
background:rgba(59,130,246,.08);
filter:blur(90px);
z-index:-1;
}

header{
position:sticky;
top:0;
z-index:1000;
width:88%;
max-width:820px;
margin:auto;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(135deg,#4A0754,#0A0016);
border-radius:0 0 18px 18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.header-title{
display:flex;
align-items:center;
gap:12px;
color:#fff;
font-family:"Bricolage Grotesque",sans-serif;
font-size:.78rem;
font-weight:700;
}

.header-title i{
width:38px;
height:38px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.12);
}

.back-btn{
text-decoration:none;
color:#fff;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,.12);
font-size:.8rem;
border:none;
-webkit-tap-highlight-color:transparent;
}

.container{
width:88%;
max-width:820px;
margin:35px auto 50px;
}

.page-intro h2{
font-family:"Bricolage Grotesque",sans-serif;
font-size:18px;
margin-bottom:6px;
color:#0A0016;
}

.page-intro p{
font-size:11px;
color:#64748b;
line-height:1.6;
}

#archiveGrid{
display:grid;
gap:16px;
margin-top:24px;
}

.lesson-card{
background:#fff;
border:1px solid rgba(15,23,42,.08);
border-radius:18px;
padding:18px;
box-shadow:0 8px 25px rgba(15,23,42,.05);
cursor:pointer;
transition:.3s;
}

.lesson-card:hover{
transform:translateY(-3px);
box-shadow:0 18px 35px rgba(15,23,42,.08);
}

.lesson-topic{
font-family:"Bricolage Grotesque",sans-serif;
font-size:13px;
font-weight:700;
margin-bottom:8px;
color:#0A0016;
}

.lesson-meta{
display:flex;
gap:12px;
flex-wrap:wrap;
font-size:11px;
color:#64748b;
}

.loading{
padding:30px;
text-align:center;
color:#64748b;
font-size:.7rem;
}

@media(max-width:600px){

.container{
width:88%;
}

.page-intro h2{
font-size:18px;
}

.page-intro p{
font-size:12px;
}

.lesson-card{
padding:15px;
}

.lesson-topic{
font-size:14px;
}

}
</style>
</head>
<body>

<header>
<div class="header-title">
<i class="fas fa-book-open"></i>
<span>Lesson Archive</span>
</div>

<a href="lessons.html" class="back-btn">
Back
</a>
</header>

<div class="container">

<div class="page-intro">
<h2>All Combined Lesson Notes</h2>
<p>
Browse previous combined lesson notes, memory verses, Bible texts and Yoruba audio memory verses.
</p>
</div>

<div id="archiveGrid">
<div class="loading">Loading lessons...</div>
</div>

</div>

<script>

/*
Replace the URL below with your Lesson Archive Apps Script URL
ending with ?action=getLessons
*/

const LESSON_URL =
"https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec?action=getLessons";

async function loadLessons(){

const grid = document.getElementById("archiveGrid");

try{

const response = await fetch(LESSON_URL);
const data = await response.json();

grid.innerHTML = "";

if(!data.lessons || data.lessons.length === 0){

grid.innerHTML =
'<div class="loading">No lessons found.</div>';

return;
}

data.lessons.reverse().forEach(lesson=>{

grid.innerHTML += `
<div class="lesson-card" data-id="${lesson.id}">

<div class="lesson-topic">
${lesson.topic}
</div>

<div class="lesson-meta">
<span>📅 ${lesson.date}</span>
<span>📝 Lesson ID: ${lesson.id}</span>
</div>

</div>
`;

});

}catch(error){

grid.innerHTML =
'<div class="loading">Unable to load lessons.</div>';

console.log(error);

}

}

loadLessons();

</script>

</body>
</html>
