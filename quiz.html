<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekly Quiz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:"DM Sans",sans-serif;
background:#fafafa;
min-height:100vh;
padding-bottom:40px;
overflow-x:hidden;

}


body::before{

content:"";
position:fixed;
width:300px;
height:300px;
right:-100px;
top:-100px;
background:rgba(168,85,247,.12);
filter:blur(90px);
z-index:-1;

}


body,
input,
select,
button,
option,
p,
label{

font-family:"DM Sans",sans-serif;

}

.hero-title,
.status h2,
.question h3,
#resultBox h2{

font-family:"Bricolage Grotesque",sans-serif;

}

header{

width:88%;
max-width:820px;
margin:auto;
padding:15px 18px;

background:
linear-gradient(
135deg,
#4A0754,
#0A0016
);

border-radius:0 0 20px 20px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}



.title{

display:flex;
align-items:center;
gap:10px;

font-family:"Bricolage Grotesque";
font-weight:700;
font-size:15px;

}



.title i{

width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,.15);

}



.back{

color:white;
text-decoration:none;
background:rgba(255,255,255,.15);
padding:9px 14px;
border-radius:30px;
font-size:12px;

}



.container{

width:88%;
max-width:820px;
margin:30px auto;

}

#quizCountdown{

margin-top:12px;

display:inline-block;

padding:10px 14px;

border-radius:999px;

background:rgba(255,255,255,.12);

font-size:.75rem;

font-weight:600;

}

#addNameBtn{

font-family:"Bricolage Grotesque",sans-serif;
font-weight:700;

}

.card{

background:white;
border-radius:22px;
padding:20px;
margin-bottom:18px;

box-shadow:
0 15px 40px rgba(0,0,0,.07);

border:1px solid rgba(0,0,0,.05);

}



.status{

text-align:center;

}



.status h2{

font-family:"Bricolage Grotesque";
font-size:.95rem;
margin-bottom:8px;

}



.status p{

font-size:12px;
color:#64748b;
line-height:1.6;

}




select, input{ width:100%; height:52px; padding:0 16px; border-radius:14px; border:1px solid #ddd; outline:none; font-size:.8rem; margin-top:10px; background:white; appearance:none; -webkit-appearance:none; -moz-appearance:none; }

.select-wrap{

position:relative;

width:100%;

}



.select-wrap i{

position:absolute;

right:16px;

top:50%;

transform:translateY(-50%);

font-size:.8rem;

color:#64748b;

pointer-events:none;

}

button{

border:none;
cursor:pointer;

}



.primary{

width:100%;
padding:14px;

margin-top:15px;

background:#4A0754;

color:white;

border-radius:30px;

font-weight:600;

}



.question{

margin-bottom:20px;

}



.question h3{

font-size:.85rem;
line-height:1.6;
margin-bottom:12px;

}



.option{

display:flex;
align-items:center;
gap:10px;

padding:12px 14px;

border-radius:14px;

background:#f8fafc;

margin-bottom:10px;

font-size:.8rem;

cursor:pointer;

border:1px solid #e5e7eb;

transition:all .25s ease;

-webkit-tap-highlight-color:transparent;

user-select:none;

}

.option:hover{

background:#fdfcff;

border-color:rgba(74,7,84,.25);

transform:translateY(-1px);

box-shadow:
0 6px 16px rgba(74,7,84,.05);

}

.option:has(input:checked){

background:rgba(74,7,84,.06);

border-color:#4A0754;

box-shadow:
0 8px 18px rgba(74,7,84,.08);

}

.option input{

appearance:none;
-webkit-appearance:none;

width:18px;
height:18px;

border-radius:50%;

border:2px solid #cbd5e1;

background:white;

margin:0;

flex-shrink:0;

transition:.25s ease;

cursor:pointer;

}

.option input:checked{

background:#4A0754;

border-color:#4A0754;

box-shadow:
inset 0 0 0 4px white;

}
  


.result{

display:none;

text-align:center;

padding:30px;

background:
linear-gradient(
135deg,
#ffffff,
#faf5ff
);

border:1px solid rgba(74,7,84,.08);

}



.result h2{

font-family:"Bricolage Grotesque";

}



.big{

font-size:42px;

font-weight:800;

color:#4A0754;

margin:15px 0;

font-family:
"Bricolage Grotesque";

}



.loading-btn{

opacity:.75;

pointer-events:none;

}



.quiz-hero{

position:relative;

overflow:hidden;

background:
linear-gradient(
135deg,
#4A0754,
#23022b
);

color:white;

padding:22px;

border-radius:22px;

margin-bottom:18px;

}



.quiz-hero::before{

content:"";

position:absolute;

right:-40px;

top:-40px;

width:140px;

height:140px;

border-radius:50%;

background:rgba(255,255,255,.08);

}



.hero-badge{

display:inline-flex;

align-items:center;

gap:8px;

padding:8px 12px;

border-radius:999px;

background:rgba(255,255,255,.12);

font-size:11px;

margin-bottom:12px;

}



.hero-title{

font-family:"Bricolage Grotesque";

font-size:1rem;

font-weight:800;

margin-bottom:8px;

}



.hero-text{

font-size:.75rem;

line-height:1.7;

opacity:.9;

}



.question{

margin-bottom:28px;

padding-bottom:18px;

border-bottom:1px solid rgba(0,0,0,.05);

}

.primary:focus,
.primary:active,
button:focus,
button:active{

outline:none;
box-shadow:none;

}


.hidden{

display:none;

}


</style>

</head>


<body>


<header>

<div class="title">

<i class="fa-solid fa-brain"></i>

Weekly Quiz

</div>


<a href="index.html" class="back">
Back
</a>


</header>




<div class="container">



<div class="quiz-hero">

<div class="hero-badge">
<i class="fa-solid fa-trophy"></i>
Weekly Bible Quiz
</div>

<div class="hero-title">
Test Your Knowledge
</div>

<div class="hero-text">
Answer the weekly lesson questions and earn points automatically.
</div>

<div id="quizCountdown"></div>

</div>

<div class="card status" id="statusCard">

<div class="loading">
Loading quiz...
</div>

</div>



<div class="card hidden" id="quizBox">



<h3 style="margin-bottom:15px;">
Select Your Name
</h3>


<div class="select-wrap">

<select id="memberSelect">

<option value="">
Select Your Name
</option>

</select>

<i class="fa-solid fa-chevron-down"></i>

</div>



<input
id="newName"
placeholder="If your name is not listed, enter your name"
>



<button
id="addNameBtn"
class="primary"
onclick="addNewMember()">

Add My Name

</button>

<div style="height:30px;"></div>

<div id="questions"></div>



<button
class="primary"
id="submitBtn"
onclick="submitQuiz()">

Submit Quiz

</button>



</div>






<div class="card result" id="resultBox">


<div style="
font-size:55px;
margin-bottom:10px;
">
🏆
</div>

<h2>
Quiz Completed Successfully
</h2>


<div class="big" id="score">

</div>


<p id="points">

</p>


<p id="total">

</p>



</div>



</div>





<script>


const API =
"https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";

let quizCloseTime = "";
let countdownInterval;

let quizData=[];

let selectedLesson="";





async function loadQuiz(){


const res =
await fetch(
API+"?action=getQuiz"
);


const data =
await res.json();



const box =
document.getElementById("statusCard");



if(!data.success){


box.innerHTML =
`
<h2>${data.message}</h2>
<p>Please check back during the quiz period.</p>
`;

return;

}



selectedLesson =
data.lessonNo;

quizCloseTime = new Date(data.closeTime);

console.log("Close Time:", data.closeTime);
  
quizData =
data.questions;



box.innerHTML =
`

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
">

<div style="
text-align:left;
">

<h2 style="
margin:0 0 6px 0;
">
Lesson ${data.lessonNo}
</h2>

<p style="
margin:0;
">
${data.questionCount} Questions Available
</p>

</div>

<div style="
background:#f8fafc;
padding:10px 14px;
border-radius:14px;
font-size:11px;
font-weight:600;
color:#4A0754;
">

🏆 Earn Points

</div>

</div>

`;

function startCountdown(){

clearInterval(
countdownInterval
);

countdownInterval =
setInterval(()=>{

const end =
quizCloseTime.getTime();

const now =
new Date().getTime();

const diff =
end - now;

if(diff <= 0){

document
.getElementById("quizCountdown")
.innerHTML =
"Quiz Closed";

clearInterval(
countdownInterval
);

return;

}

const days =
Math.floor(
diff / 86400000
);

const hours =
Math.floor(
(diff % 86400000)
/ 3600000
);

const mins =
Math.floor(
(diff % 3600000)
/ 60000
);

const secs =
Math.floor(
(diff % 60000)
/ 1000
);

document
.getElementById("quizCountdown")
.innerHTML =

"⏳ Closes In: " +

days+"d " +
hours+"h " +
mins+"m " +
secs+"s";

},1000);

}


document
.getElementById("quizBox")
.classList.remove("hidden");


loadMembers();

renderQuestions();

startCountdown();

}




async function loadMembers(){

const res =
await fetch(
API+"?action=getMembers"
);

const data =
await res.json();

const select =
document.getElementById("memberSelect");

select.innerHTML =
`
<option value="">
Select Your Name
</option>
`;

data.members.forEach(m=>{

select.innerHTML +=
`
<option value="${m.memberId}">
${m.name}
</option>
`;

});

}




function renderQuestions(){


const area =
document.getElementById("questions");



area.innerHTML="";



quizData.forEach((q,index)=>{


area.innerHTML +=

`

<div class="question">


<h3>

${index+1}. ${q.question}

</h3>



<label class="option">

<input type="radio" name="q${index}" value="A">

${q.optionA}

</label>


<label class="option">

<input type="radio" name="q${index}" value="B">

${q.optionB}

</label>


<label class="option">

<input type="radio" name="q${index}" value="C">

${q.optionC}

</label>


<label class="option">

<input type="radio" name="q${index}" value="D">

${q.optionD}

</label>


</div>

`;



});



}




async function addNewMember(){

const btn =
event.target;

const name =
document.getElementById("newName")
.value
.trim();

if(!name){

alert("Enter your name");

return;

}

btn.innerHTML =
'<i class="fa-solid fa-spinner fa-spin"></i> Adding Name...';

btn.classList.add("loading-btn");

try{

const res =
await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"addMember",

name:name

})

});

const data =
await res.json();

alert("Name added successfully");

loadMembers();

document
.getElementById("newName")
.value="";

}
catch(error){

alert("Unable to add name");

}

btn.innerHTML =
'Add My Name';

btn.classList.remove("loading-btn");

}





async function submitQuiz(){

const submitBtn =
document.getElementById("submitBtn");

submitBtn.innerHTML =
'<i class="fa-solid fa-spinner fa-spin"></i> Submitting Quiz...';

submitBtn.classList.add("loading-btn");

submitBtn.disabled = true;


const memberId =
document.getElementById("memberSelect").value;

if(!memberId){

alert(
"Please select your name before submitting."
);

submitBtn.innerHTML =
"Submit Quiz";

submitBtn.classList.remove("loading-btn");

submitBtn.disabled = false;

return;

}

let answers = {};


quizData.forEach((q,index)=>{

const checked =
document.querySelector(
`input[name="q${index}"]:checked`
);

if(checked){

answers[index+1] =
checked.value;

}

});


try{

const res =
await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"scoreQuiz",

memberId:memberId,

lessonNo:selectedLesson,

answers:answers

})

});


const data =
await res.json();


if(!data.success){

alert(data.message);

submitBtn.innerHTML =
"Submit Quiz";

submitBtn.classList.remove("loading-btn");

submitBtn.disabled = false;

return;

}



document
.getElementById("quizBox")
.classList.add("hidden");


document
.getElementById("resultBox")
.style.display="block";



document
.getElementById("score")
.innerHTML =
data.score;



document
.getElementById("points")
.innerHTML =
"Points Earned: " +
data.pointsEarned;



document
.getElementById("total")
.innerHTML =
"Total Points: " +
data.totalPoints;



window.scrollTo({

top:0,

behavior:"smooth"

});


}catch(error){

alert("Unable to submit quiz.");

submitBtn.innerHTML =
"Submit Quiz";

submitBtn.classList.remove("loading-btn");

submitBtn.disabled = false;

}

}


loadQuiz();



</script>



</body>
</html>
