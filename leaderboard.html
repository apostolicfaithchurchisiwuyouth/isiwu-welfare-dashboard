
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"DM Sans",sans-serif;
background:#fafafa;
padding-bottom:40px;
}


header{
width:88%;
max-width:820px;
margin:auto;
padding:16px 18px;
background:linear-gradient(135deg,#4A0754,#120016);
border-radius:0 0 25px 25px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 15px 35px rgba(0,0,0,.18);
}

.title{
font-family:"Bricolage Grotesque";
font-size:.85rem;
display:flex;
align-items:center;
gap:10px;
}

.title i{
width:30px;
height:30px;
border-radius:14px;
background:rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
}


.back{
color:white;
text-decoration:none;
font-size:.75rem;
padding:9px 15px;
border-radius:30px;
background:rgba(255,255,255,.15);
}


.container{
width:88%;
max-width:820px;
margin:25px auto;
}


.card{
background:white;
border-radius:15px;
padding:22px;
margin-bottom:20px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
border:1px solid rgba(0,0,0,.04);
}


.card-title{
font-family:"Bricolage Grotesque";
font-size:.85rem;
color:#4A0754;
margin-bottom:8px;
}


.subtitle{
font-size:.75rem;
color:#64748b;
margin-bottom:18px;
}


/* TOP THREE */

.podium{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
align-items:end;
}


.performer{

position:relative;
background:linear-gradient(145deg,#ffffff,#faf5ff);

border-radius:15px;

padding:12px 8px;

text-align:center;

overflow:hidden;

border:1px solid rgba(74,7,84,.08);

min-width:0;

height:175px;

display:flex;
flex-direction:column;
justify-content:center;

}


.performer::before{

content:"";

position:absolute;
width:70px;
height:70px;
right:-20px;
top:-20px;

border-radius:50%;

background:rgba(74,7,84,.08);

}


.crown{
font-size:24px;
position:relative;
}


.avatar{

width:42px;
height:42px;

border-radius:50%;

margin:7px auto;

background:#4A0754;
color:white;

display:flex;
align-items:center;
justify-content:center;

font-weight:700;

font-size:.75rem;

}


.name{
font-family:"Bricolage Grotesque";

font-size:.68rem;

line-height:1.15;

height:32px;

display:flex;
align-items:center;
justify-content:center;

word-break:break-word;
overflow-wrap:anywhere;

overflow:hidden;
}


.id{
font-size:.65rem;
color:#64748b;
margin-top:4px;

word-break:break-word;
}


.points{

margin-top:6px;

font-weight:800;

font-size:.68rem;

color:#4A0754;

}

.name2{
font-size:.68rem;
font-weight:700;
}


.score{
font-size:.7rem;
color:#4A0754;
font-weight:700;
}

/* REMOVE LEADERBOARD SCROLL */

.list{
max-height:none;
overflow:visible;
}



/* LEADERBOARD ITEMS */

.item{

display:flex;
justify-content:space-between;
align-items:center;

padding:15px;

margin-bottom:12px;

background:#fafafa;

border-radius:20px;

}



/* MOBILE */

@media(max-width:600px){

.podium{
grid-template-columns:repeat(3,1fr);
gap:7px;
}


.performer{
padding:12px 5px;
border-radius:18px;
}


.avatar{
width:36px;
height:36px;
font-size:12px;
}


.crown{
font-size:18px;
}


.name{
font-size:.6rem;
line-height:1.15;
}


.id{
font-size:.55rem;
}


.points{
font-size:.65rem;
}


.item{
padding:10px;
}

}

/* =========================
   PREMIUM LEADERBOARD RANK
========================= */

.rank{

width:36px;
height:36px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-family:"Bricolage Grotesque";
font-size:.78rem;
font-weight:900;

color:white;

background:
linear-gradient(
135deg,
#4A0754,
#a855f7
);

box-shadow:
0 10px 25px rgba(74,7,84,.25);

flex-shrink:0;

position:relative;
overflow:hidden;

}


/* glass reflection */

.rank::after{

content:"";

position:absolute;

width:18px;
height:18px;

border-radius:50%;

background:rgba(255,255,255,.25);

top:-6px;
right:-5px;

}



/* GOLD - FIRST */

.item:nth-child(1) .rank{

background:
linear-gradient(
135deg,
#fbbf24,
#f97316
);

box-shadow:
0 10px 25px rgba(249,115,22,.35);

}


/* SILVER - SECOND */

.item:nth-child(2) .rank{

background:
linear-gradient(
135deg,
#cbd5e1,
#64748b
);

}


/* BRONZE - THIRD */

.item:nth-child(3) .rank{

background:
linear-gradient(
135deg,
#fb923c,
#92400e
);

}



/* keep rows aligned */

.item{

display:flex;
align-items:center;
justify-content:space-between;
gap:12px;

}



/* mobile */

@media(max-width:600px){

.rank{

width:30px;
height:30px;

font-size:.65rem;

}

}

</style>

</head>


<body>


<header>

<div class="title">
<i class="fa-solid fa-ranking-star"></i>
Leaderboard
</div>

<a class="back" href="index.html">
Back
</a>

</header>



<div class="container">


<div class="card">

<div class="card-title">
Top 3 Performance
</div>

<div class="subtitle">
Highest accumulated quiz points
</div>


<div class="podium" id="topThree">

</div>


</div>



<div class="card">

<div class="card-title">
Overall Leaderboard
</div>

<div class="list" id="leaderboard" style="font-size:.7rem;">
Loading...
</div>

</div>


</div>



<script>

const API="https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";


async function load(){

const res=await fetch(API+"?action=getLeaderboard");

const data=await res.json();

const list=data.leaderboard || [];

let top=document.getElementById("topThree");

top.innerHTML="";


list.slice(0,3).forEach((m,i)=>{

top.innerHTML += `

<div class="performer">

<div class="crown">
${i==0?"👑":i==1?"🥈":"🥉"}
</div>

<div class="avatar">
${m.name.charAt(0)}
</div>

<div class="name">
${m.name}
</div>

<div class="id">
${m.memberId}
</div>

<div class="points">
${m.points} pts
</div>

</div>

`;

});


let board=document.getElementById("leaderboard");

board.innerHTML="";


list.forEach((m,i)=>{

board.innerHTML +=`

<div class="item">

<div style="display:flex;gap:12px;align-items:center">

<div class="rank">${i+1}</div>

<div>

<div class="name2">${m.name}</div>

<div class="id">${m.memberId}</div>

</div>

</div>


<div class="score">
${m.points}
</div>

</div>

`;

});

}


load();

</script>


</body>
</html>
