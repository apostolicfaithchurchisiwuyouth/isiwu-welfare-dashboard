<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AFC Isiwu Youth Welfare Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Host+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}


body{

font-family:'Host Grotesk',sans-serif;

background:
radial-gradient(circle at top left,#eadcff,transparent 30%),
radial-gradient(circle at bottom right,#dbeafe,transparent 30%),
#f8fafc;

color:#202033;

overflow-x:hidden;

}


h1,h2,h3{

font-family:'Bricolage Grotesque',sans-serif;

}


/* =========================
   STICKY APP HEADER
========================= */

header{

position:fixed;

top:0;
left:0;

width:100%;

height:72px;

z-index:999999;

display:flex;

align-items:center;

background:

rgba(255,255,255,.78);

backdrop-filter:blur(18px);

border-bottom:

1px solid rgba(124,58,237,.12);

box-shadow:

0 10px 35px rgba(0,0,0,.06);

padding:0 20px;

}


.header-content{

width:100%;

max-width:900px;

margin:auto;

display:flex;

align-items:center;

justify-content:space-between;

gap:15px;

}



.header-title{

display:flex;

align-items:center;

gap:12px;

}



.header-title i{

width:38px;

height:38px;

border-radius:14px;

display:flex;

align-items:center;

justify-content:center;

background:#ede9fe;

color:#7c3aed;

font-size:1rem;

}



.header-title h1{

font-size:.95rem;

font-weight:700;

color:#24112f;

margin:0;

}



.header-title p{

display:none;

}



.back-btn{

margin:0;

padding:9px 14px;

border-radius:14px;

background:#4a0754;

color:white;

font-size:.72rem;

font-weight:600;

display:inline-flex;

align-items:center;

gap:7px;

text-decoration:none;

}


.back-btn:hover{

transform:translateY(-2px);

}




/* =========================
   MAIN CONTAINER
========================= */


.container{

max-width:900px;

margin:auto;

padding:

95px 15px 30px;

}




/* =========================
   SECTION TITLE
========================= */


.section-title{

margin:

22px 0 12px;

}



.section-title h2{

font-size:.82rem;

}



.section-title i{

width:32px;

height:32px;

border-radius:11px;

font-size:.75rem;

}





/* =========================
   DASHBOARD GRID
========================= */


.dashboard-grid{


display:grid;


grid-template-columns:

repeat(2,1fr);


gap:14px;


}




.stat-card{


padding:16px;


border-radius:22px;


}



.stat-icon{


width:42px;

height:42px;


border-radius:14px;


font-size:1rem;


margin-bottom:12px;


}



.stat-card h3{


font-size:.68rem;


margin-bottom:6px;


}



.amount{


font-size:1.15rem;


}




/* =========================
   ACTIVITIES
========================= */


.activities{


padding:14px;

border-radius:22px;


}



.activity-item{


display:grid;


grid-template-columns:

38px 1fr auto;


align-items:center;


gap:12px;


padding:12px;


margin-bottom:10px;


border-radius:16px;


background:#fafafa;


}



.activity-icon{


width:38px;

height:38px;


border-radius:13px;


font-size:.85rem;


}



.activity-name{


font-size:.75rem;

font-weight:700;


}



.activity-amount{


font-size:.75rem;


}



.activity-item small{


font-size:.65rem;


color:#64748b;


}



/* =========================
 MOBILE
========================= */


@media(max-width:600px){


header{

height:64px;

padding:0 12px;

}



.header-title h1{

font-size:.78rem;

}



.header-title i{

width:34px;

height:34px;

}



.back-btn{

padding:8px 10px;

font-size:.65rem;

}




.container{

padding-top:85px;

}




.dashboard-grid{

grid-template-columns:repeat(2,1fr);

gap:10px;

}



.stat-card{

padding:13px;

}



.amount{

font-size:1rem;

}



.activity-item{


grid-template-columns:

34px 1fr;


}


.activity-amount{

grid-column:2;

font-size:.7rem;

}



}
</style>

</head>


<body>


<script>

const dashboardPassword="1";

const enteredPassword=prompt("Enter Welfare Dashboard Password");


if(enteredPassword!==dashboardPassword){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#4a0754;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
">

<h1>Access Denied</h1>

<p>
Incorrect password. Unauthorized access.
</p>

</div>

`;

throw new Error("Unauthorized");

}


</script>



<header>


<div class="header-content">



<div class="header-title">


<i class="fa-solid fa-heart-pulse"></i>


<h1>
AFC Isiwu Welfare Dashboard
</h1>


</div>




<a href="index.html" class="back-btn">


<i class="fa-solid fa-arrow-left"></i>


Back


</a>



</div>


</header>


<div class="container">


<div class="section-title">

<i class="fa-solid fa-chart-pie"></i>

<h2>Financial Overview</h2>

</div>



<div class="dashboard-grid">



<div class="stat-card">

<div class="stat-icon green-icon">

<i class="fa-solid fa-hand-holding-dollar"></i>

</div>


<h3>Total Contributions</h3>

<div class="amount" id="totalContributions">
Updating...
</div>

</div>



<div class="stat-card">

<div class="stat-icon red-icon">

<i class="fa-solid fa-wallet"></i>

</div>


<h3>Total Expenses</h3>

<div class="amount" id="totalExpenses">
Updating...
</div>

</div>



<div class="stat-card">

<div class="stat-icon blue-icon">

<i class="fa-solid fa-building-columns"></i>

</div>


<h3>Current Balance</h3>

<div class="amount" id="currentBalance">
Updating...
</div>

</div>



<div class="stat-card">

<div class="stat-icon purple-icon">

<i class="fa-solid fa-users"></i>

</div>


<h3>Welfare Status</h3>

<div class="amount">
Active
</div>

</div>


</div>
<!-- =========================
ACTIVITY SECTION
========================= -->


<div class="section-title">

<i class="fa-solid fa-clock-rotate-left"></i>

<h2>Recent Welfare Activities</h2>

</div>


<div class="activities" id="activityFeed">


<div class="activity-item">

<div class="activity-left">

<div class="activity-icon">

<i class="fa-solid fa-spinner fa-spin"></i>

</div>


<div>

<div class="activity-name">
Loading activities...
</div>

</div>


</div>


</div>


</div>





<!-- =========================
CHART SECTION
========================= -->


<div class="section-title">

<i class="fa-solid fa-chart-line"></i>

<h2>Financial Analytics</h2>

</div>



<div class="chart-box">


<canvas id="financeChart"></canvas>


</div>





<a href="index.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back To Homepage

</a>



</div>



<footer>

AFC Isiwu Youth Welfare System © 2026

</footer>





<script>


/*
====================================
GOOGLE SHEET LINKS
====================================
*/


const welfareCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=439044630&single=true&output=csv";


const activitiesCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHlE5IpmFYaQyW5u-rentH2fGC5VZJ2w9Ql1WI-X8bE76qlN5_ttDIitwlXX1CM4sqdEW8RroDUNSU/pub?gid=493023062&single=true&output=csv";





async function fetchSheetData(){


try{


const response = await fetch(welfareCSV);

const data = await response.text();


const rows =
data.trim()
.split('\n')
.map(r=>r.split(','));



const contributions =
parseFloat(rows[0]?.[1]) || 0;


const expenses =
parseFloat(rows[1]?.[1]) || 0;



const balance =
parseFloat(rows[2]?.[1]) || 0;




document.getElementById("totalContributions")
.innerText =
`₦${contributions.toLocaleString()}`;



document.getElementById("totalExpenses")
.innerText =
`₦${expenses.toLocaleString()}`;



document.getElementById("currentBalance")
.innerText =
`₦${balance.toLocaleString()}`;





/*
=========================
CHART
=========================
*/


const ctx =
document.getElementById("financeChart");



if(window.financeChartInstance){

window.financeChartInstance.destroy();

}




window.financeChartInstance =
new Chart(ctx,{

type:"bar",


data:{


labels:[

"Contributions",

"Expenses",

"Balance"

],


datasets:[{

data:[

contributions,

expenses,

balance

],


borderRadius:14,


backgroundColor:[

"#7c3aed",

"#ef4444",

"#2563eb"

]


}]


},



options:{


responsive:true,


plugins:{


legend:{

display:false

}


},



scales:{


y:{

beginAtZero:true

}


}



}


});







/*
=========================
ACTIVITY FETCH
=========================
*/


const activityResponse =
await fetch(activitiesCSV);


const activityData =
await activityResponse.text();



const activityRows =
activityData
.trim()
.split('\n')
.map(r=>r.split(','));




const feed =
document.getElementById("activityFeed");



feed.innerHTML="";



activityRows
.reverse()
.slice(0,10)
.forEach(row=>{



const purpose=row[0];

const amount=row[1];



if(purpose){



feed.innerHTML += `


<div class="activity-item">


<div class="activity-left">


<div class="activity-icon">

<i class="fa-solid fa-heart"></i>

</div>



<div>


<div class="activity-name">

${purpose}

</div>


<small>
Welfare activity recorded
</small>


</div>


</div>



<div class="activity-amount">

₦${Number(amount).toLocaleString()}

</div>



</div>


`;



}


});





}

catch(error){

console.log(
"Welfare Error:",
error
);

}



}





fetchSheetData();



setInterval(

fetchSheetData,

30000

);



</script>



</body>

</html>
