<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        AFC Isiwu Youth Portal | Growth Tracker
    </title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- AOS -->

    <link
        rel="stylesheet"
        href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="../css/growthtracker.css"
    >

</head>

<body>

    <!-- Header -->

    <header class="main-header">

    <div class="header-title">

        <div class="header-icon">

            <i class="fa-solid fa-chart-line"></i>

        </div>

        <div class="header-text">

            <h1>SLC Quiz Results</h1>

        </div>

    </div>

    <a href="../index.html" class="back-btn">

        <i class="fa-solid fa-arrow-left"></i>

        Back

    </a>

</header>

    <main class="container">

        <!-- Season 2 -->

        <section
            class="card"
            data-aos="fade-up"
        >

            <div class="section-header">

                <div>

                    <h2 class="card-title">

                        Season 2

                    </h2>

                    <p class="card-subtitle">

                        Participant consistency and overall progress for season 2.

                    </p>

                </div>

                <span class="section-badge live">

                    Live

                </span>

            </div>

            <div class="table-head">

                <span>Members</span>

                <span>Weeks</span>

                <span>Points</span>

            </div>

            <div id="leaderboard">

                <div class="loading">

                    Loading participant progress...

                </div>

            </div>

        </section>

        <!-- Season 1 -->

        <section
            class="card"
            data-aos="fade-up"
            data-aos-delay="100"
        >

            <div class="section-header">

                <div>

                    <h2 class="card-title">

                        Growth Tracker (Season 1)

                    </h2>

                    <p class="card-subtitle">

                        Overall progress in Season 1.

                    </p>

                </div>

                <span class="section-badge archive">

                    Archive

                </span>

            </div>

            <div class="table-head">

                <span>Members</span>

                <span>Weeks</span>

                <span>Points</span>

            </div>

            <div id="season1">

                <!-- Archived members go here -->

            </div>

        </section>

    </main>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>

        AOS.init({

            duration: 600,

            once: true

        });

    </script>

    <script src="../js/growthtracker.js"></script>

</body>

</html>
