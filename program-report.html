<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Welfare Form</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>


*{
box-sizing:border-box;
}


body{
margin:0;
font-family:DM Sans,sans-serif;
background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

min-height:100vh;

}

#loadingScreen{

position:fixed;

inset:0;

background:white;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

z-index:999999;

}


.loader{

width:55px;

height:55px;

border-radius:50%;

border:5px solid #eee;

border-top-color:#4a0754;

animation:spin 1s linear infinite;

}


@keyframes spin{

to{
transform:rotate(360deg);
}

}


#successBox{

position:fixed;

inset:0;

background:white;

display:none;

flex-direction:column;

align-items:center;

justify-content:center;

z-index:999999;

}



.success-icon{

width:90px;

height:90px;

border-radius:50%;

background:#4a0754;

color:white;

font-size:55px;

display:flex;

align-items:center;

justify-content:center;

animation:pop .4s ease;

}


@keyframes pop{

from{
transform:scale(.5);
}

to{
transform:scale(1);
}

}

#loginOverlay{

position:fixed;

inset:0;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

display:none;

align-items:center;

justify-content:center;

z-index:99999;

}



.login-modal{

width:90%;

max-width:390px;

background:white;

padding:30px;

border-radius:20px;

text-align:center;

box-shadow:
0 30px 70px rgba(0,0,0,.3);

}

/* INPUTS */

.login-modal input{

width:100%;

padding:14px 16px;

margin-bottom:14px;

border:1px solid #ddd;

border-radius:12px;

outline:none;

font-size:14px;

background:#fafafa;

color:#0a0016;

transition:.3s;

}


.login-modal input::placeholder{

color:#6b7280;

opacity:1;

}


.login-modal input:focus{

border-color:#4a0754;

background:#fff;

box-shadow:
0 0 0 4px rgba(74,7,84,.12);

}



/* BUTTON */

#loginBtn{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

color:white;

font-size:14px;

font-weight:600;

cursor:pointer;

transition:.3s;

box-shadow:
0 10px 25px rgba(74,7,84,.25);

}


#loginBtn:hover{

transform:translateY(-2px);

box-shadow:
0 15px 30px rgba(74,7,84,.35);

}


#loginBtn:active{

transform:translateY(0);

}



/* ERROR MESSAGE */

#loginError{

margin-top:12px;

font-size:13px;

font-weight:500;

color:#dc2626;

}

.login-logo{

width:65px;

height:65px;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

border-radius:18px;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

color:white;

font-size:25px;

}

/* HEADER */

header{

height:75px;

padding:0 7%;

display:flex;

align-items:center;

justify-content:space-between;

background:white;

box-shadow:
0 10px 30px rgba(0,0,0,.12);

}


.header-title{

display:flex;

align-items:center;

gap:12px;

font-size:22px;

font-weight:700;

color:#0a0016;

}


.header-title i{

width:42px;

height:42px;

display:flex;

align-items:center;

justify-content:center;

border-radius:12px;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

color:white;

}



/* BACK */

.back-btn{

background:#4a0754;

color:white;

border:none;

padding:10px 18px;

border-radius:12px;

cursor:pointer;

}



/* CONTENT */


.container{

width:90%;

max-width:900px;

margin:35px auto;

}

#formContent{

display:none;

}

.form-card{

background:white;

border-radius:24px;

padding:25px;

box-shadow:

0 25px 60px rgba(0,0,0,.2);

}



/* TITLE */


.form-title{

text-align:center;

margin-bottom:20px;

}


.form-title h2{

margin:0;

color:#0a0016;

}



.form-title p{

color:#64748b;

font-size:14px;

}




/* GOOGLE FORM */


iframe{

width:100%;

min-height:900px;

border:none;

border-radius:18px;

}




@media(max-width:600px){


.header-title{

font-size:16px;

}


.form-card{

padding:12px;

border-radius:18px;

}


iframe{

min-height:1000px;

}


}


</style>

</head>



<body>


<div id="loadingScreen">

<div class="loader"></div>

<p>
Loading Report Form...
</p>

</div>



<div id="loginOverlay">


<div class="login-modal">


<div class="login-logo">

<i class="fas fa-users"></i>

</div>


<h2>Secretariat</h2>

<p class="login-subtitle">
Registered Secretary Only
</p>


<input
id="username"
placeholder="Username">


<input
id="password"
type="password"
placeholder="Password">


<button id="loginBtn">
Continue
</button>


<p id="loginError"></p>


</div>

</div>

  <div id="successBox">


<div class="success-icon">

✓

</div>


<h2>
Submitted Successfully
</h2>


<p>
Your response has been recorded.
</p>


</div>
  
<header>


<div class="header-title">

<i class="fas fa-file-signature"></i>

<span>
Secretary Registration
</span>

</div>


<a href="index.html"
class="back-btn">

Back

</a>


</header>



<div id="formContent">

<div class="container">


<div class="form-card">


<div class="form-title">

<h2>
Welfare Form
</h2>


<p>
Complete the form below
</p>

</div>



<iframe

src="https://docs.google.com/forms/d/e/1FAIpQLSc3Hv8kbfN7oBKW488fryGIKeQL3W6xWasR1qQMCp6dVkuAkg/viewform?usp=header">

</iframe>



</div>


</div>

</div>
</div>
  <script>
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";


window.onload=()=>{


setTimeout(()=>{


document
.getElementById("loadingScreen")
.style.display="none";


document
.getElementById("loginOverlay")
.style.display="flex";


},1200);


};



loginBtn.onclick=async()=>{


let username =
document.getElementById("username").value;


let password =
document.getElementById("password").value;



const res =
await fetch(
SCRIPT_URL,
{

method:"POST",

headers:{
"Content-Type":
"text/plain"
},

body:JSON.stringify({

username,

password

})

});



const data =
await res.json();



if(data.success){


sessionStorage.setItem(
"formAccess",
"true"
);


loginOverlay.style.display="none";


formContent.style.display="block";



}else{


loginError.innerText=
"Access denied. Not registered.";


}


};

</script>
</body>

</html>
