<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        AFC Isiu Youth Portal | Welfare Dashboard

    </title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- AOS -->

    <link
        rel="stylesheet"
        href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    >

    <!-- Chart.js -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="../css/welfare.css"
    >

</head>

<body>

    <!-- LOGIN -->

    <div id="loginOverlay">

        <div class="login-modal">

            <div class="login-logo">

                <i class="fas fa-hand-holding-heart"></i>

            </div>

            <h2>

                Welfare Dashboard

            </h2>

            <p class="login-subtitle">

                Authorized Personnel Only

            </p>

            <input
                type="text"
                id="username"
                placeholder="Username"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <button id="loginBtn">

                Login

            </button>
            <a href="../index" class="login-back-btn">

    <i class="fas fa-arrow-left"></i>

    Go Back

</a>

            <p id="loginError"></p>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div id="dashboardContent">

        <header class="main-header">

            <div class="header-title">

                <i class="fas fa-hand-holding-heart"></i>

                <span>

                    Welfare Dashboard

                </span>

            </div>

            <button
                id="logoutBtn"
                class="back-btn"
            >

                <i class="fas fa-right-from-bracket"></i>

                Logout

            </button>

        </header>

        <main class="container">

            <!-- Overview -->


            <div class="dashboard-grid">

                <div
                    class="card"
                    data-aos="fade-up"
                    data-aos-delay="100"
                >

                    <div class="icon green">

                        <i class="fas fa-wallet"></i>

                    </div>

                    <div class="label">

                        Total Contributions

                    </div>

                    <div
                        class="amount"
                        id="totalContributions"
                    >

                        Updating...

                    </div>

                </div>

                <div
                    class="card"
                    data-aos="fade-up"
                    data-aos-delay="150"
                >

                    <div class="icon red">

                        <i class="fas fa-money-bill-wave"></i>

                    </div>

                    <div class="label">

                        Total Expenses

                    </div>

                    <div
                        class="amount"
                        id="totalExpenses"
                    >

                        Updating...

                    </div>

                </div>

                <div
                    class="card"
                    data-aos="fade-up"
                    data-aos-delay="200"
                >

                    <div class="icon blue">

                        <i class="fas fa-piggy-bank"></i>

                    </div>

                    <div class="label">

                        Current Balance

                    </div>

                    <div
                        class="amount"
                        id="currentBalance"
                    >

                        Updating...

                    </div>

                </div>

                <div
                    class="card"
                    data-aos="fade-up"
                    data-aos-delay="250"
                >

                    <div class="icon purple">

                        <i class="fas fa-shield-heart"></i>

                    </div>

                    <div class="label">

                        Welfare Status

                    </div>

                    <div class="amount">

                        Active

                    </div>

                </div>

            </div>

            <!-- Activities -->

            <section
                class="activities"
                data-aos="fade-up"
                data-aos-delay="300"
            >

                <div class="card-header">

                    <div>

                        <h3>

                            Welfare Activities

                        </h3>

                        <p>

                            Latest transactions and updates

                        </p>

                    </div>

                    <div class="header-badge">

                        10 Recent

                    </div>

                </div>

                <table class="modern-table">

                    <tbody id="activityTable"></tbody>

                </table>

                <div class="pagination">

    <button onclick="prevPage()">
        Previous
    </button>

    <span id="pageNumber">
        Page 1
    </span>

    <button onclick="nextPage()">
        Next
    </button>

</div>
            </section>

            <!-- Chart -->

            <section
                class="chart-box"
                data-aos="fade-up"
                data-aos-delay="350"
            >

                <div class="card-header">

                    <div>

                        <h3>

                            Financial Analytics

                        </h3>

                        <p>

                            Live Overview

                        </p>

                    </div>

                    <div class="header-badge">

                        Live Data

                    </div>

                </div><br>

                <canvas id="financeChart"></canvas>

            </section>

        </main>

    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>

        AOS.init({

            duration: 700,

            once: true

        });

    </script>

    <script src="../js/welfare.js"></script>

</body>

</html>
