<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Welfare Form</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>


*{
box-sizing:border-box;
}


body{

margin:0;

font-family:
Inter,Segoe UI,sans-serif;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

min-height:100vh;

}


/* HEADER */

header{

height:75px;

padding:0 7%;

display:flex;

align-items:center;

justify-content:space-between;

background:white;

box-shadow:
0 10px 30px rgba(0,0,0,.12);

}


.header-title{

display:flex;

align-items:center;

gap:12px;

font-size:22px;

font-weight:700;

color:#0a0016;

}


.header-title i{

width:42px;

height:42px;

display:flex;

align-items:center;

justify-content:center;

border-radius:12px;

background:
linear-gradient(
135deg,
#0a0016,
#4a0754
);

color:white;

}



/* BACK */

.back-btn{

background:#4a0754;

color:white;

border:none;

padding:10px 18px;

border-radius:12px;

cursor:pointer;

}



/* CONTENT */


.container{

width:90%;

max-width:900px;

margin:35px auto;

}



.form-card{

background:white;

border-radius:24px;

padding:25px;

box-shadow:

0 25px 60px rgba(0,0,0,.2);

}



/* TITLE */


.form-title{

text-align:center;

margin-bottom:20px;

}


.form-title h2{

margin:0;

color:#0a0016;

}



.form-title p{

color:#64748b;

font-size:14px;

}




/* GOOGLE FORM */


iframe{

width:100%;

min-height:900px;

border:none;

border-radius:18px;

}




@media(max-width:600px){


.header-title{

font-size:16px;

}


.form-card{

padding:12px;

border-radius:18px;

}


iframe{

min-height:1000px;

}


}


</style>

</head>



<body>



<header>


<div class="header-title">

<i class="fas fa-file-signature"></i>

<span>
Welfare Registration
</span>

</div>


<a href="index.html"
class="back-btn">

Back

</a>


</header>




<div class="container">


<div class="form-card">


<div class="form-title">

<h2>
Welfare Form
</h2>


<p>
Complete the form below
</p>

</div>



<iframe

src="https://docs.google.com/forms/d/e/1FAIpQLSc3Hv8kbfN7oBKW488fryGIKeQL3W6xWasR1qQMCp6dVkuAkg/viewform?usp=header">

</iframe>



</div>


</div>



</body>

</html>
