<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekly Quiz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:"DM Sans",sans-serif;
background:#fafafa;
min-height:100vh;
padding-bottom:40px;
overflow-x:hidden;

}


body::before{

content:"";
position:fixed;
width:300px;
height:300px;
right:-100px;
top:-100px;
background:rgba(168,85,247,.12);
filter:blur(90px);
z-index:-1;

}



header{

width:88%;
max-width:820px;
margin:auto;
padding:15px 18px;

background:
linear-gradient(
135deg,
#4A0754,
#0A0016
);

border-radius:0 0 20px 20px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}



.title{

display:flex;
align-items:center;
gap:10px;

font-family:"Bricolage Grotesque";
font-weight:700;
font-size:15px;

}



.title i{

width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,.15);

}



.back{

color:white;
text-decoration:none;
background:rgba(255,255,255,.15);
padding:9px 14px;
border-radius:30px;
font-size:12px;

}



.container{

width:88%;
max-width:820px;
margin:30px auto;

}



.card{

background:white;
border-radius:22px;
padding:20px;
margin-bottom:18px;

box-shadow:
0 15px 40px rgba(0,0,0,.07);

border:1px solid rgba(0,0,0,.05);

}



.status{

text-align:center;

}



.status h2{

font-family:"Bricolage Grotesque";
font-size:18px;
margin-bottom:8px;

}



.status p{

font-size:12px;
color:#64748b;
line-height:1.6;

}




select,input{

width:100%;
padding:14px;

border-radius:14px;

border:1px solid #ddd;

outline:none;

font-size:13px;

margin-top:10px;

}



button{

border:none;
cursor:pointer;

}



.primary{

width:100%;
padding:14px;

margin-top:15px;

background:#4A0754;

color:white;

border-radius:30px;

font-weight:600;

}



.question{

margin-bottom:20px;

}



.question h3{

font-size:14px;
line-height:1.6;
margin-bottom:12px;

}



.option{

display:block;

padding:12px;

border-radius:14px;

background:#f8fafc;

margin-bottom:8px;

font-size:13px;

cursor:pointer;

}



.option input{

width:auto;
margin-right:8px;

}



.result{

display:none;
text-align:center;

}



.result h2{

font-family:"Bricolage Grotesque";

}



.big{

font-size:25px;
font-weight:800;
color:#4A0754;
margin:10px;

}



.loading{

text-align:center;
padding:30px;
color:#64748b;

}


.hidden{

display:none;

}


</style>

</head>


<body>


<header>

<div class="title">

<i class="fa-solid fa-brain"></i>

Weekly Quiz

</div>


<a href="index.html" class="back">
Back
</a>


</header>




<div class="container">



<div class="card status" id="statusCard">

<div class="loading">
Loading quiz...
</div>

</div>




<div class="card hidden" id="quizBox">



<h3 style="margin-bottom:15px;">
Select Your Name
</h3>


<select id="memberSelect">

<option>
Loading members...
</option>

</select>



<input
id="newName"
placeholder="If your name is not listed, enter your name"
>



<button class="primary" onclick="addNewMember()">

Add My Name

</button>




<div id="questions"></div>



<button class="primary" onclick="submitQuiz()">

Submit Quiz

</button>



</div>






<div class="card result" id="resultBox">


<h2>
🎉 Quiz Completed
</h2>


<div class="big" id="score">

</div>


<p id="points">

</p>


<p id="total">

</p>



</div>



</div>





<script>


const API =
"https://script.google.com/macros/s/AKfycbw1mVwpgAcIOSNbpgzy52TFyozEGMtWWwVWUDFaofGNzpsguBIaKR4q1dXVtgVHO2xZ1w/exec";



let quizData=[];

let selectedLesson="";





async function loadQuiz(){


const res =
await fetch(
API+"?action=getQuiz"
);


const data =
await res.json();



const box =
document.getElementById("statusCard");



if(!data.success){


box.innerHTML =
`
<h2>${data.message}</h2>
<p>Please check back during the quiz period.</p>
`;

return;

}



selectedLesson =
data.lessonNo;


quizData =
data.questions;



box.innerHTML =
`

<h2>
Weekly Quiz
</h2>

<p>
Lesson ${data.lessonNo}
</p>

`;



document
.getElementById("quizBox")
.classList.remove("hidden");


loadMembers();

renderQuestions();


}





async function loadMembers(){


const res =
await fetch(
API+"?action=getMembers"
);


const data =
await res.json();



const select =
document.getElementById("memberSelect");


select.innerHTML="";



data.members.forEach(m=>{


select.innerHTML +=
`

<option value="${m.memberId}">

${m.name}

</option>

`;


});


}





function renderQuestions(){


const area =
document.getElementById("questions");



area.innerHTML="";



quizData.forEach((q,index)=>{


area.innerHTML +=

`

<div class="question">


<h3>

${index+1}. ${q.question}

</h3>



<label class="option">

<input type="radio" name="q${index}" value="A">

${q.optionA}

</label>


<label class="option">

<input type="radio" name="q${index}" value="B">

${q.optionB}

</label>


<label class="option">

<input type="radio" name="q${index}" value="C">

${q.optionC}

</label>


<label class="option">

<input type="radio" name="q${index}" value="D">

${q.optionD}

</label>


</div>

`;



});



}




async function addNewMember(){


const name =
document.getElementById("newName").value.trim();



if(!name){

alert("Enter your name");

return;

}



const res =
await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"addMember",

name:name

})

});



const data =
await res.json();


alert(
"Added successfully"
);


loadMembers();


}






async function submitQuiz(){


const memberId =
document.getElementById("memberSelect").value;



let answers={};



quizData.forEach((q,index)=>{


const checked =
document.querySelector(
`input[name="q${index}"]:checked`
);



if(checked){

answers[index+1]=
checked.value;

}


});




const res =
await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"scoreQuiz",

memberId:memberId,

lessonNo:selectedLesson,

answers:answers

})

});



const data =
await res.json();



if(!data.success){

alert(data.message);

return;

}




document
.getElementById("quizBox")
.classList.add("hidden");



document
.getElementById("resultBox")
.style.display="block";



document
.getElementById("score")
.innerHTML =
data.score;



document
.getElementById("points")
.innerHTML =
"Points Earned: "+data.pointsEarned;



document
.getElementById("total")
.innerHTML =
"Total Points: "+data.totalPoints;



}






loadQuiz();



</script>



</body>
</html>
